<style>
:root{--gr:#1A5EA8;--gr2:#154d8c;--grl:#dceef9;--gd:#3A8FD0;--gdl:#eef6fd;--bl:#1A5EA8;--bll:#dceef9;--tx:#1a2a3a;--bg:#f5f9fd;--cd:#fff;--bd:#bdd6ee;--r:12px;--fz:1rem;--fa:'Amiri','Traditional Arabic',serif;--fl:'Inter',system-ui,sans-serif}
[data-hc]{--bg:#fff;--cd:#f0f0ec;--tx:#000;--grl:#cce0f5;--gdl:#dceef9;--bll:#cce0f5}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:var(--fz);scroll-behavior:smooth}
body{font-family:var(--fl);background:var(--bg);color:var(--tx);min-height:100vh;line-height:1.7}
[dir=rtl]{font-family:var(--fa)}
.sc{display:none;min-height:100vh;flex-direction:column}
.sc.on{display:flex}
#s1{background:linear-gradient(160deg,#071428,#0d3a7a 45%,#1A5EA8 100%);align-items:center;justify-content:center;padding:2rem 1rem}
.s1w{width:100%;max-width:540px;text-align:center}
.s1lg{width:88px;height:88px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto .9rem;border:3px solid rgba(255,255,255,.4);overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.25)}
.s1hosp{color:rgba(255,255,255,.9);font-family:var(--fa);font-size:1.05rem;direction:rtl;margin-bottom:.1rem}
.s1hospsub{color:rgba(255,255,255,.5);font-size:.73rem;font-family:var(--fl);direction:ltr;letter-spacing:.06em;margin-bottom:1.1rem}
.s1t{color:#fff;font-family:var(--fa);font-size:1.45rem;font-weight:700;direction:rtl;margin-bottom:.3rem}
.s1s{color:rgba(255,255,255,.55);font-size:.82rem;margin-bottom:1.75rem;font-family:var(--fl);direction:ltr}
.lgr{display:grid;grid-template-columns:repeat(2,1fr);gap:.6rem}
@media(min-width:500px){.lgr{grid-template-columns:repeat(3,1fr)}}
.lb{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:var(--r);padding:.7rem .85rem;cursor:pointer;display:flex;align-items:center;gap:.6rem;color:#fff;font-size:.93rem;transition:all .2s;min-height:44px;width:100%;text-align:start}
.lb:hover,.lb:focus{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.75);outline:2px solid rgba(255,255,255,.55);outline-offset:2px}
.lf{font-size:1.35rem;flex-shrink:0}
.ln{font-weight:500}
.tb{background:var(--gr);color:#fff;padding:.8rem 1rem;display:flex;align-items:center;gap:.6rem;position:sticky;top:0;z-index:100;box-shadow:0 2px 10px rgba(26,94,168,.35)}
.tb-bk{background:none;border:none;color:#fff;font-size:1.5rem;cursor:pointer;padding:.2rem .45rem;border-radius:6px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;transition:background .2s;line-height:1}
.tb-bk:hover{background:rgba(255,255,255,.15)}
.tb-t{font-size:.97rem;font-weight:600;flex:1;text-align:start}
.tb-c{display:flex;gap:.35rem;align-items:center}
.cb{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:7px;padding:.25rem .45rem;cursor:pointer;font-size:.76rem;font-weight:600;min-height:44px;min-width:34px;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:var(--fl)!important}
.cb:hover{background:rgba(255,255,255,.27)}
.cb.on{background:#fff;color:var(--gr);border-color:#fff}
.s2h{background:linear-gradient(135deg,var(--gr2),var(--gr));padding:1.5rem 1.2rem;text-align:center;color:#fff}
.s2b{font-family:var(--fa);font-size:1.08rem;color:rgba(255,255,255,.95);direction:rtl}
.s2a{font-family:var(--fa);color:rgba(255,255,255,.65);font-size:.88rem;direction:rtl;margin-top:.3rem}
.tl{padding:.8rem;display:flex;flex-direction:column;gap:.55rem;flex:1}
.tc{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);padding:.85rem 1rem;cursor:pointer;display:flex;align-items:center;gap:.85rem;box-shadow:0 1px 8px rgba(26,94,168,.08);transition:all .22s;min-height:64px}
.tc:hover,.tc:focus{border-color:var(--gr);box-shadow:0 4px 18px rgba(26,94,168,.16);transform:translateY(-2px);outline:2px solid var(--gr);outline-offset:2px}
.tic{width:44px;height:44px;background:var(--grl);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1.25rem;flex-shrink:0}
.tn{width:24px;height:24px;background:var(--gr);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;flex-shrink:0;font-family:var(--fl)!important}
.ti{flex:1;min-width:0}
.tt{font-size:.95rem;font-weight:600;line-height:1.4;color:var(--tx)}
.ta{color:#8aabcc;font-size:.9rem;flex-shrink:0}
[dir=rtl] .ta{transform:scaleX(-1)}
.cw{padding:1.1rem .9rem 2rem;max-width:760px;margin:0 auto}
.pp{margin-bottom:1.3rem;font-size:1.04rem;line-height:2.1;color:var(--tx)}
.pp:last-child{margin-bottom:0}
.ph{margin:1.2rem 0;padding:1rem 1.2rem;border-inline-start:3px solid var(--gr);background:var(--grl);border-radius:0 var(--r) var(--r) 0;font-size:1.04rem;line-height:2.1;color:#0c2d55}
.pv{margin:1.3rem 0;padding:1.1rem 1.35rem;background:var(--gdl);border-radius:var(--r);text-align:center;font-size:1.08rem;line-height:2.1;border:1px solid var(--bd);color:#0c2d55;font-style:italic}
:focus-visible{outline:2px solid var(--gd);outline-offset:2px}
@media(max-width:380px){.tb-t{font-size:.87rem}.pp,.ph,.pv{font-size:.97rem}}
</style>
</head>

<script>
const LG={
  ar:{n:'العربية',f:'🇸🇦',d:'rtl',v:'ar-SA'},
  ur:{n:'اردو',f:'🇵🇰',d:'rtl',v:'ur-PK'},
  fa:{n:'فارسی',f:'🇮🇷',d:'rtl',v:'fa-IR'},
  en:{n:'English',f:'🇬🇧',d:'ltr',v:'en-US'},
  fr:{n:'Français',f:'🇫🇷',d:'ltr',v:'fr-FR'},
  hi:{n:'हिन्दी',f:'🇮🇳',d:'ltr',v:'hi-IN'},
  bn:{n:'বাংলা',f:'🇧🇩',d:'ltr',v:'bn-BD'},
  id:{n:'Indonesia',f:'🇮🇩',d:'ltr',v:'id-ID'},
  ms:{n:'Melayu',f:'🇲🇾',d:'ltr',v:'ms-MY'},
  tr:{n:'Türkçe',f:'🇹🇷',d:'ltr',v:'tr-TR'}
};
let CL='ar',CT=0,FL=1,HC=false;

/* ====== CONTENT DATA — inserted by step 2-4 ====== */
const TP=/*TOPICS_START*/[
{id:1,icon:'🕌',
title:{ar:'مقدمة وأحكام الطهارة والاستنجاء',ur:'مقدمہ اور طہارت و استنجاء کے احکام',fa:'مقدمه و احکام طهارت',en:'Introduction & Rules of Purification',fr:'Introduction et règles de purification',hi:'परिचय और पवित्रता के नियम',bn:'ভূমিকা ও পবিত্রতার বিধান',id:'Pendahuluan & Hukum Bersuci',ms:'Pendahuluan & Hukum Bersuci',tr:'Giriş ve Temizlik Hükümleri'},
blocks:[
{type:'i',text:{ar:'الحمد لله رب العالمين، والصلاة والسلام على أشرف الأنبياء والمرسلين نبينا محمد وعلى آله وصحبه أجمعين وبعد فهذه كلمة مختصرة تتعلق ببعض أحكام طهارة المريض وصلاته.',en:'All praise is due to Allah, Lord of the worlds. Peace and blessings upon Prophet Muhammad ﷺ, his family and companions. This is a brief guide on rulings of purification and prayer for the sick.',ur:'تمام تعریف اللہ کے لیے۔ نبی محمد ﷺ پر درود۔ یہ بیمار کی طہارت اور نماز کے احکام پر مختصر رہنمائی ہے۔',fa:'ستایش خداوند را. درود بر پیامبر محمد ﷺ. این راهنمای کوتاهی درباره احکام طهارت و نماز بیمار است.',fr:'Louange à Allah. Paix sur le Prophète Muhammad ﷺ. Ce guide traite des règles de purification et de prière pour le malade.',hi:'सभी प्रशंसा अल्लाह के लिए। नबी मुहम्मद ﷺ पर दरूद। यह बीमार की पवित्रता और नमाज़ के नियमों पर संक्षिप्त मार्गदर्शिका है।',bn:'সকল প্রশংসা আল্লাহর। নবী মুহাম্মাদ ﷺ-এর উপর দরূদ। এটি রোগীর পবিত্রতা ও নামাযের বিধান সম্পর্কিত সংক্ষিপ্ত নির্দেশিকা।',id:'Segala puji bagi Allah. Shalawat atas Nabi Muhammad ﷺ. Panduan singkat hukum bersuci dan shalat bagi orang sakit.',ms:'Segala puji bagi Allah. Selawat atas Nabi Muhammad ﷺ. Panduan ringkas hukum bersuci dan solat bagi orang sakit.',tr:'Hamd Allah\'a aittir. Peygamberimiz ﷺ\'e salat ve selam. Bu hasta için temizlik ve namaz hükümlerine dair kısa bir rehberdir.'}},
{type:'r',text:{ar:'لقد شرع الله سبحانه وتعالى الطهارة لكل صلاة، فإن رفع الحدث وإزالة النجاسة ـ سواء كانت في البدن أو الثوب أو المكان المصلى فيه ـ شرطان من شروط الصلاة. فإذا أراد المسلم الصلاة وجب عليه أن يتوضأ من الحدث الأصغر، أو يغتسل إن كان حدثه أكبر. ولابد قبل الوضوء من الاستنجاء بالماء أو الاستجمار بالحجارة في حق من بال أو أتى الغائط لتتم الطهارة والنظافة.',en:'Allah prescribed purification for every prayer. Removing minor impurity (hadath) and filth (najas) — on the body, clothes, or prayer place — are conditions for valid prayer. A Muslim must perform wudu from minor impurity, or ghusl for major impurity. Before wudu, istinja (water cleansing) or istijmar (stone cleansing) is required after relieving oneself.',ur:'اللہ نے ہر نماز کے لیے طہارت فرض کی۔ حدث کا ازالہ اور نجاست دور کرنا — بدن، کپڑوں یا نماز کی جگہ — نماز کی شرطیں ہیں۔ وضو یا غسل واجب ہے۔ بول و براز کے بعد استنجاء یا استجمار ضروری ہے۔',fa:'خداوند برای هر نماز طهارت را واجب کرده. رفع حدث و ازاله نجاست شرط نماز است. مسلمان باید وضو یا غسل کند و قبل از آن استنجاء یا استجمار نماید.',fr:'Allah a prescrit la purification pour toute prière. Lever l\'impureté et éliminer la souillure sont des conditions de la prière. Le wudu ou le ghusl est obligatoire, précédé d\'istinja ou d\'istijmar.',hi:'अल्लाह ने हर नमाज़ के लिए पवित्रता अनिवार्य की। हदस और नजासत दूर करना नमाज़ की शर्तें हैं। वुज़ू या गुस्ल वाजिब है, पेशाब/पाखाने के बाद इस्तिन्जा या इस्तिजमार ज़रूरी है।',bn:'আল্লাহ প্রতি নামাযের জন্য পবিত্রতা ফরয করেছেন। হাদাস ও নাজাসাত দূর করা নামাযের শর্ত। ওযু বা গোসল ওয়াজিব, পেশাব/পায়খানার পর ইস্তিঞ্জা বা ইস্তিজমার আবশ্যক।',id:'Allah mewajibkan bersuci untuk setiap shalat. Menghilangkan hadats dan najis adalah syarat shalat. Wudu atau mandi wajib, didahului istinja atau istijmar.',ms:'Allah mewajibkan bersuci untuk setiap solat. Mengangkat hadas dan najis syarat solat. Wudu atau mandi wajib, didahului istinja atau istijmar.',tr:'Allah her namaz için temizliği farz kıldı. Hadesi gidermek ve necaseti temizlemek namazın şartıdır. Abdest veya gusül, önce istinca veya istijmar gerekir.'}},
{type:'r',text:{ar:'فالاستنجاء بالماء واجب لكل خارج من السبيلين كالبول والغائط وليس على من نام أو خرجت منه ريح إنما عليه الوضوء لأن الاستنجاء إنما شرع لإزالة النجاسة، ولا نجاسة هاهنا. والاستجمار يقوم مقام الاستنجاء بالماء، ويكون بالحجارة أو ما يقوم مقامها، ولابد فيه من ثلاثة أحجار طاهرة.',en:'Istinja with water is obligatory for everything exiting the two passages (urine, stool). Passing gas or sleeping only requires wudu — no istinja, since there is no physical filth. Istijmar with stones or similar material takes the place of water, requiring at least three pure stones.',ur:'پانی سے استنجاء دونوں راستوں سے خارج ہونے والی ہر چیز پر واجب ہے۔ ریح یا نیند پر صرف وضو کافی ہے۔ استجمار پتھروں سے کیا جاتا ہے، کم از کم تین پاک پتھر ضروری ہیں۔',fa:'استنجاء با آب برای هر چیزی که از دو راه خارج شود واجب است. برای باد یا خواب فقط وضو کافی است. استجمار با سه سنگ پاک جای استنجاء را می‌گیرد.',fr:'L\'istinja à l\'eau est obligatoire pour tout ce qui sort des deux voies. Pour le vent ou le sommeil, seul le wudu suffit. L\'istijmar avec trois pierres pures remplace l\'eau.',hi:'पानी से इस्तिन्जा दोनों रास्तों से निकलने वाली हर चीज़ पर वाजिब है। हवा या नींद पर सिर्फ वुज़ू काफी है। इस्तिजमार तीन पाक पत्थरों से किया जाता है।',bn:'পানি দিয়ে ইস্তিঞ্জা উভয় রাস্তার জন্য ওয়াজিব। বায়ু বা ঘুমে শুধু ওযু। ইস্তিজমার তিনটি পাক পাথরে।',id:'Istinja wajib untuk yang keluar dari dua jalan. Kentut atau tidur cukup wudu. Istijmar dengan tiga batu suci menggantikan air.',ms:'Istinja wajib bagi yang keluar dari dua jalan. Kentut atau tidur cukup wudu. Istijmar dengan tiga batu suci menggantikan air.',tr:'Suyla istinca iki yoldan çıkan her şey için vaciptir. Yellenme veya uyku için sadece abdest yeterli. Üç temiz taşla istijmar suyun yerine geçer.'}},
{type:'h',text:{ar:'لما ثبت عن النبي ﷺ أنه قال: «من استجمر فليوتر» ولقوله أيضاً: «إذا ذهب أحدكم إلى الغائط فليذهب معه بثلاثة أحجار، فإنها تجزىء عنه» رواه أبو داود. ولنهيه عن الاستجمار بأقل من ثلاثة أحجار (رواه مسلم). ولا يجوز الاستجمار بالروث والعظام والطعام، وكل ما له حرمة.',en:'The Prophet ﷺ said: "Whoever cleans with stones, let him use an odd number." And: "Let one of you take three stones to relieve himself — they will suffice." [Abu Dawud] He forbade fewer than three [Muslim]. It is forbidden to use dung, bones, food, or anything sacred.',ur:'نبی ﷺ نے فرمایا: «جو استجمار کرے طاق استعمال کرے» اور: «تین پتھر ساتھ لے جائے» [ابو داؤد]۔ تین سے کم سے منع فرمایا [مسلم]۔ گوبر، ہڈی، کھانے یا قابل احترام چیز سے استجمار جائز نہیں۔',fa:'پیامبر ﷺ فرمود: «فرد استجمار کند» و «سه سنگ ببرد» [ابوداود]. از کمتر از سه سنگ نهی کرد [مسلم]. با سرگین، استخوان یا غذا جائز نیست.',fr:'Le Prophète ﷺ : « Que celui qui utilise les pierres use d\'un nombre impair » et « trois pierres suffisent » [Abu Dawud]. Il interdit moins de trois [Muslim]. Défendu d\'utiliser fumier, os, nourriture ou objets sacrés.',hi:'नबी ﷺ: «ताक पत्थर इस्तेमाल करे» और «तीन पत्थर ले जाए» [अबू दाऊद]। तीन से कम मना है [मुस्लिम]। गोबर, हड्डी, खाना या पवित्र चीज़ से जायज़ नहीं।',bn:'নবী ﷺ: «বেজোড় ব্যবহার করো» এবং «তিনটি পাথর নাও» [আবু দাউদ]। তিনের কম নিষেধ [মুসলিম]। গোবর, হাড়, খাবার থেকে জায়েজ নয়।',id:'Nabi ﷺ: "gunakan bilangan ganjil" dan "bawalah tiga batu" [Abu Dawud]. Kurang dari tiga dilarang [Muslim]. Dilarang dengan kotoran, tulang, makanan.',ms:'Nabi ﷺ: "gunakan bilangan ganjil" dan "bawa tiga batu" [Abu Dawud]. Kurang dari tiga dilarang [Muslim]. Dilarang dengan najis, tulang, makanan.',tr:'Peygamber ﷺ: "Tek sayı kullansın" ve "üç taş alsın" [Ebu Davud]. Üçten azı yasak [Müslim]. Dışkı, kemik veya yiyecekle istijmar caiz değil.'}},
{type:'r',text:{ar:'والأفضل أن يستجمر الإنسان بالحجارة وما أشبهها كالمناديل ونحو ذلك، ثم يتبعها الماء؛ لأن الحجارة تزيل عين النجاسة، والماء يطهر المحل، فيكون أبلغ. وإن أراد الاقتصار على أحدهما فالماء أفضل لأنه يطهر المحل ويزيل العين والأثر وهو أبلغ في التنظيف.',en:'Best practice: use stones or tissue first, then water — stones remove the substance of impurity and water purifies the area completely. If choosing only one, water is superior as it removes all traces.',ur:'بہترین یہ ہے کہ پتھروں یا ٹشو سے پھر پانی استعمال کرے۔ صرف ایک پر اقتصار کرے تو پانی بہتر ہے۔',fa:'بهترین استفاده از سنگ و سپس آب است. اگر یکی باید انتخاب کرد آب بهتر است.',fr:'L\'idéal est d\'utiliser les pierres puis l\'eau. Si un seul est choisi, l\'eau est préférable.',hi:'बेहतर है पत्थर फिर पानी। एक ही चुनना हो तो पानी बेहतर है।',bn:'সর্বোত্তম পাথর তারপর পানি। একটি বেছে নিলে পানি উত্তম।',id:'Terbaik: batu lalu air. Jika satu dipilih, air lebih utama.',ms:'Terbaik: batu kemudian air. Jika satu dipilih, air lebih afdal.',tr:'En iyi: önce taş sonra su. Sadece biri seçilecekse su daha üstündür.'}}
]},
{id:2,icon:'🤲',
title:{ar:'أحكام التيمم واليسر في الشريعة',ur:'تیمم کے احکام اور شریعت میں آسانی',fa:'احکام تیمم و آسانی در شریعت',en:'Rules of Tayammum & Ease in Islam',fr:'Règles du tayammum et facilité dans la charia',hi:'तयम्मुम के नियम और इस्लाम में सरलता',bn:'তায়াম্মুমের বিধান ও ইসলামে সহজতা',id:'Hukum Tayammum & Kemudahan Syariat',ms:'Hukum Tayammum & Kemudahan Syariat',tr:'Teyemmüm Hükümleri ve İslam\'da Kolaylık'},
blocks:[
{type:'h',text:{ar:'والإنسان مخير بين الاستنجاء بالماء أو الاستجمار بالحجارة وما أشبهها أو الجمع بينهما، عن أنس رضي الله عنه قال: «كان النبي ﷺ يدخل الخلاء فأحمل أنا وغلام نحوي إداوة من ماء وعنزة، فيستنجي بالماء» (متفق عليه)',en:'A person may choose water, stones, or both. Anas (may Allah be pleased with him) said: "The Prophet ﷺ would enter the privy, and I and a boy would carry a water vessel — he would clean himself with water." [Agreed upon]',ur:'انسان پانی، پتھر یا دونوں میں سے کچھ بھی استعمال کرے۔ انس رضی اللہ عنہ نے کہا: «نبی ﷺ جب قضائے حاجت جاتے تو ہم پانی لاتے، آپ پانی سے استنجاء فرماتے» (متفق علیہ)',fa:'انسان بین آب، سنگ یا هر دو مخیر است. انس گفت: «پیامبر ﷺ با آب استنجاء می‌کرد» (متفق علیه)',fr:'On peut choisir l\'eau, les pierres ou les deux. Anas dit : « Le Prophète ﷺ se purifiait avec de l\'eau. » [Muttafaq alaih]',hi:'व्यक्ति पानी, पत्थर या दोनों में से जो चाहे चुन सकता है। अनस ने कहा: «नबी ﷺ पानी से इस्तिन्जा करते थे» (मुत्तफ़क़ अलैह)',bn:'মানুষ পানি, পাথর বা উভয়ের মধ্যে যেকোনো বেছে নিতে পারে। আনাস বললেন: «নবী ﷺ পানি দিয়ে ইস্তিঞ্জা করতেন» (মুত্তাফাক)',id:'Boleh memilih air, batu, atau keduanya. Anas: "Nabi ﷺ beristinja dengan air." [Muttafaq alaih]',ms:'Boleh memilih air, batu, atau kedua-duanya. Anas: "Nabi ﷺ beristinja dengan air." [Muttafaq alaih]',tr:'Su, taş veya ikisi seçilebilir. Enes: "Peygamber ﷺ su ile istinca yapardı." [Müttefekun aleyh]'}},
{type:'h',text:{ar:'وعن عائشة رضي الله عنها أنها قالت لجماعة من النساء: «مرن أزواجكن أن يستطيبوا بالماء فإني أستحييهم، وإن رسول الله ﷺ كان يفعله» قال الترمذي: هذا حديث صحيح.',en:'Aisha (may Allah be pleased with her) told women: "Tell your husbands to cleanse with water — I am too shy to tell them myself, and the Messenger of Allah ﷺ used to do so." Al-Tirmidhi: This is a sound hadith.',ur:'عائشہ رضی اللہ عنہا نے خواتین سے کہا: «اپنے شوہروں کو پانی سے صفائی کا کہیں، مجھے شرم آتی ہے، رسول اللہ ﷺ ایسا کرتے تھے»۔ ترمذی: صحیح حدیث۔',fa:'عائشه به زنان گفت: «به شوهرانتان بگویید با آب پاک شوند؛ رسول الله ﷺ این کار را می‌کرد» ترمذی: صحیح.',fr:'Aïcha dit aux femmes : « Dites à vos maris de se purifier avec de l\'eau ; le Messager ﷺ le faisait. » Al-Tirmidhi : hadith sahih.',hi:'आयशा ने महिलाओं से कहा: «पतियों को पानी से सफाई के लिए कहो, रसूलुल्लाह ﷺ यही करते थे»। तिर्मिज़ी: सहीह।',bn:'আয়েশা বললেন: «স্বামীদের পানি দিয়ে পবিত্রতার কথা বলো, রাসুলুল্লাহ ﷺ করতেন»। তিরমিযী: সহীহ।',id:'Aisyah berkata kepada para wanita: "Perintahkan suami-suami bersuci dengan air; Rasulullah ﷺ melakukannya." Tirmidzi: sahih.',ms:'Aisyah berkata: "Perintahkan suami bersuci dengan air; Rasulullah ﷺ melakukannya." Tirmidzi: sahih.',tr:'Aişe kadınlara: "Kocalarınıza su ile temizlenmelerini söyleyin; Resulullah ﷺ bunu yapardı." Tirmizî: sahih.'}},
{type:'v',text:{ar:'ولما كانت الشريعة الإسلامية مبنية على اليسر والسهولة، فقد خفف الله سبحانه وتعالى عن أهل الأعذار عباداتهم بحسب أعذارهم؛ ليتمكنوا من عبادته تعالى بدون حرج ولا مشقة. قال تعالى: ﴿وَمَا جَعَلَ عَلَيْكُمْ فِي الدِّينِ مِنْ حَرَجٍ﴾ [الحج: ٧٨] وقال: ﴿يُرِيدُ اللَّهُ بِكُمُ الْيُسْرَ وَلَا يُرِيدُ بِكُمُ الْعُسْرَ﴾ [البقرة: ١٨٥] وقال: ﴿فَاتَّقُوا اللَّهَ مَا اسْتَطَعْتُمْ﴾ [التغابن: ١٦]',en:'Islamic law is built on ease. Allah has lightened worship for those with valid excuses. ❝He has not placed any difficulty upon you in the religion.❞ [22:78] ❝Allah intends ease for you, not hardship.❞ [2:185] ❝Fear Allah as much as you are able.❞ [64:16]',ur:'شریعت آسانی پر مبنی ہے۔ اللہ نے فرمایا: ﴿دین میں کوئی تنگی نہیں رکھی﴾ [الحج:78] ﴿اللہ آسانی چاہتا ہے﴾ [البقرہ:185] ﴿جہاں تک ہو سکے اللہ سے ڈرو﴾ [التغابن:16]',fa:'شریعت بر آسانی است. خداوند فرمود: ﴿مشقتی در دین قرار نداده﴾ [حج:78] ﴿آسانی می‌خواهد نه سختی﴾ [بقره:185] ﴿تا توانید از خدا بترسید﴾ [تغابن:16]',fr:'La charia est fondée sur la facilité. ❝Il ne vous a pas imposé de gêne dans la religion.❞ [22:78] ❝Allah veut la facilité.❞ [2:185] ❝Craignez Allah autant que vous pouvez.❞ [64:16]',hi:'इस्लाम आसानी पर है। अल्लाह ने फरमाया: ❝दीन में कोई तंगी नहीं❞ [हज:78] ❝आसानी चाहता है❞ [बकरा:185] ❝जितना हो सके डरो❞ [तग़ाबुन:16]',bn:'ইসলাম সহজতার উপর। আল্লাহ বলেন: ❝দীনে কষ্ট রাখেননি❞ [হজ:৭৮] ❝সহজ চান❞ [বাকারা:১৮৫] ❝সাধ্যমতো ভয় করো❞ [তাগাবুন:১৬]',id:'Syariat dibangun atas kemudahan. ❝Dia tidak menjadikan kesempitan dalam agama.❞ [22:78] ❝Allah menghendaki kemudahan.❞ [2:185] ❝Bertaqwalah semampu mungkin.❞ [64:16]',ms:'Syariat dibina atas kemudahan. ❝Dia tidak menjadikan kesempitan.❞ [22:78] ❝Allah mahukan kemudahan.❞ [2:185] ❝Bertaqwalah semampu mungkin.❞ [64:16]',tr:'Şeriat kolaylık üzerine. ❝Dinde güçlük yüklemedi.❞ [22:78] ❝Kolaylık ister, güçlük istemez.❞ [2:185] ❝Gücünüz yettiğince korkun.❞ [64:16]'}},
{type:'h',text:{ar:'وقال النبي ﷺ: «إذا أمرتكم بأمر فأتوا منه ما استطعتم» وقال: «إن الدين يسر».',en:'The Prophet ﷺ said: "When I command you with something, do as much as you are able." And: "Indeed, the religion is ease."',ur:'نبی ﷺ نے فرمایا: «جہاں تک ہو سکے حکم پر عمل کرو» اور «دین آسان ہے»۔',fa:'پیامبر ﷺ فرمود: «تا توانید انجام دهید» و «دین آسان است».',fr:'Le Prophète ﷺ : « Faites ce que vous pouvez » et « La religion est facilité. »',hi:'नबी ﷺ: «जितना हो सके अमल करो» और «दीन आसान है»।',bn:'নবী ﷺ: «সাধ্যমতো পালন করো» এবং «দীন সহজ»।',id:'Nabi ﷺ: "Lakukan semampu kalian" dan "Agama adalah kemudahan."',ms:'Nabi ﷺ: "Lakukan semampu kamu" dan "Agama itu mudah."',tr:'Peygamber ﷺ: "Gücünüz yettiğince yapın" ve "Din kolaylıktır."'}}
]}
,
{id:3,icon:'🏥',
title:{ar:'حالات المريض في الطهارة',ur:'بیمار کی طہارت کی حالتیں',fa:'حالات بیمار در طهارت',en:'Patient\'s Situations Regarding Purification',fr:'Situations du malade en matière de purification',hi:'बीमार की पवित्रता की अवस्थाएं',bn:'রোগীর পবিত্রতার অবস্থাসমূহ',id:'Kondisi Pasien dalam Bersuci',ms:'Keadaan Pesakit dalam Bersuci',tr:'Hastanın Temizlik Durumları'},
blocks:[
{type:'r',text:{ar:'فالمريض إذا لم يستطع التطهر بالماء بأن يتوضأ من الحدث الأصغر، أو يغتسل من الحدث الأكبر، لعجزه أو لخوفه من زيادة المرض أو تأخر برئه فإنه يتيمم، وهو أن يضرب بيديه على التراب الطاهر ضربة واحدة، فيمسح وجهه بباطن أصابعه وكفيه براحتيه.',en:'If a patient cannot purify with water — due to inability or fear of worsening illness — he performs tayammum: strike pure earth once with both hands, wipe face with fingers and hands with palms.',ur:'اگر مریض عجز یا بیماری بڑھنے کے خوف سے پانی سے طہارت نہ کر سکے تو تیمم کرے: پاک مٹی پر ایک بار ہاتھ مار کر چہرہ اور ہاتھوں پر مسح کرے۔',fa:'اگر بیمار نتواند با آب طهارت بگیرد، تیمم می‌کند: یک ضربه دست بر خاک پاک، سپس مسح صورت و دستان.',fr:'Si le malade ne peut se purifier à l\'eau, il fait le tayammum: il frappe la terre pure une fois et essuie visage et mains.',hi:'अगर मरीज़ पानी से पवित्रता न पा सके तो तयम्मुम करे: पाक मिट्टी पर एक बार हाथ मारकर चेहरे और हाथों पर मसह।',bn:'রোগী পানিতে পবিত্র হতে না পারলে তায়াম্মুম করবে: পাক মাটিতে একবার হাত মেরে মুখ ও হাত মসেহ।',id:'Jika tidak bisa bersuci dengan air, lakukan tayammum: pukul tanah suci sekali, usap wajah dan tangan.',ms:'Jika tidak boleh bersuci dengan air, lakukan tayammum: pukul tanah suci sekali, sapu muka dan tangan.',tr:'Su ile taharet alamıyorsa teyemmüm yapar: temiz toprağa bir vurur, yüz ve ellerini mesheder.'}},
{type:'v',text:{ar:'لقوله تعالى: ﴿وَإِنْ كُنتُمْ جُنُبًا فَاطَّهَّرُوا وَإِنْ كُنتُم مَّرْضَى أَوْ عَلَى سَفَرٍ أَوْ جَاءَ أَحَدٌ مِنكُمْ مِنَ الْغَائِطِ أَوْ لَامَسْتُمُ النِّسَاءَ فَلَمْ تَجِدُوا مَاءً فَتَيَمَّمُوا صَعِيدًا طَيِّبًا فَامْسَحُوا بِوُجُوهِكُمْ وَأَيْدِيكُمْ مِنْهُ﴾ [المائدة: ٦]',en:'❝If you are in a state of janabah, purify yourselves. But if ill, traveling, have relieved yourselves or touched women and find no water — seek clean earth and wipe your faces and hands with it.❞ [Al-Ma\'idah: 6]',ur:'﴿اگر جنابت کی حالت میں ہو تو غسل کرو، اور اگر بیمار ہو یا پانی نہ ملے تو پاک مٹی سے تیمم کرو اور چہروں اور ہاتھوں پر مسح کرو﴾ [المائدہ: ٦]',fa:'﴿اگر جنب هستید غسل کنید، اگر بیمار یا مسافر هستید و آب نیافتید با خاک پاک تیمم کنید﴾ [مائده: ٦]',fr:'❝Si vous êtes en état de janaba, purifiez-vous. Si malades et sans eau — frappez une terre pure et essuyez visages et mains.❞ [5:6]',hi:'❝जनाबत में हो तो गुस्ल करो, बीमार हो और पानी न मिले तो पाक मिट्टी से तयम्मुम करो।❞ [माइदा:6]',bn:'❝জুনুব অবস্থায় গোসল করো, অসুস্থ বা পানি না পেলে পাক মাটি দিয়ে তায়াম্মুম করো।❞ [মায়েদা:৬]',id:'❝Jika junub, bersucilah. Jika sakit dan tidak ada air — tayammumlah dengan tanah suci.❞ [5:6]',ms:'❝Jika junub, bersucilah. Jika sakit dan tiada air — tayammumlah dengan tanah suci.❞ [5:6]',tr:'❝Cünüp iseniz yıkanın. Hasta olup su bulamazsanız — temiz toprakla teyemmüm edin.❞ [5:6]'}},
{type:'h',text:{ar:'والعاجز عن استعمال الماء حكمه حكم من لم يجد الماء لقول الله سبحانه: ﴿فَاتَّقُوا اللَّهَ مَا اسْتَطَعْتُمْ﴾ ولقوله ﷺ لعمار بن ياسر: «إنما يكفيك أن تقول بيديك هكذا» ثم ضرب بيديه الأرض ضربة واحدة، ثم مسح بهما وجهه وكفيه. ولا يجوز التيمم إلا بتراب طاهر له غبار. ولا يصح التيمم إلا بنية؛ لقوله ﷺ: «إنما الأعمال بالنيات، وإنما لكل امرئ ما نوى».',en:'One unable to use water equals one who cannot find it. The Prophet ﷺ told Ammar: "It suffices to do this with your hands" — struck earth once, wiped face and hands. Tayammum requires pure dusty earth and intention: "Actions are by intentions."',ur:'پانی استعمال سے عاجز کا حکم پانی نہ پانے والے جیسا ہے۔ آپ ﷺ نے عمار کو بتایا: «ہاتھوں سے ایسے کرو» — ایک ضرب لگائی اور مسح کیا۔ تیمم پاک مٹی اور نیت سے ہوتا ہے۔',fa:'عاجز از استفاده آب مثل کسی است که آب ندارد. پیامبر ﷺ به عمار: «یک ضربه بزن و مسح کن». تیمم با خاک پاک و نیت.',fr:'Incapable d\'utiliser l\'eau = ne trouve pas d\'eau. Le Prophète ﷺ à Ammar: « Frappe une fois et essuie. » Tayammum: terre pure + intention.',hi:'पानी इस्तेमाल से अक्षम = पानी न पाने वाला। नबी ﷺ ने अम्मार को: «एक बार मारो और मसह करो»। तयम्मुम: पाक मिट्टी + नीयत।',bn:'পানি ব্যবহারে অক্ষম = পানি না পাওয়া। নবী ﷺ আম্মারকে: «একবার মেরে মসেহ করো»। তায়াম্মুম: পাক মাটি + নিয়ত।',id:'Tidak bisa pakai air = tidak menemukan air. Nabi ﷺ kepada Ammar: "Pukul sekali dan usap." Tayammum: tanah suci + niat.',ms:'Tidak boleh pakai air = tidak menjumpai air. Nabi ﷺ kepada Ammar: "Pukul sekali dan sapu." Tayammum: tanah suci + niat.',tr:'Suyu kullanamayan = su bulamayan gibi. Peygamber ﷺ Ammar\'a: "Bir vur ve meshset." Teyemmüm: temiz toprak + niyet.'}},
{type:'c',text:{ar:'الحالة الأولى: إن كان مرضه يسيراً لا يخاف من استعمال الماء معه تلفاً، ولا مرضاً مخوفاً، ولا إبطاء برءه، ولا زيادة ألم، وذلك كصداع، ووجع ضرس، ونحوهما، أو كان ممن يمكنه استعمال الماء الدافئ ولا ضرر عليه. فهذا لا يجوز له التيمم.',en:'Case 1: Minor illness — no fear of harm, worsening, or delayed recovery from water (e.g. headache, toothache), or warm water can be used without harm — tayammum is NOT permitted.',ur:'پہلی حالت: ہلکی بیماری جس میں پانی سے کوئی نقصان نہ ہو — جیسے سردرد، دانت کا درد — تیمم جائز نہیں۔',fa:'حالت اول: بیماری سبک — مثل سردرد یا دندان درد — که آب ضرر نمی‌زند: تیمم جائز نیست.',fr:'Cas 1 : Maladie légère — sans danger d\'eau (maux de tête, dents) — le tayammum n\'est PAS permis.',hi:'पहली अवस्था: हल्की बीमारी — सिरदर्द, दांत का दर्द — पानी से नुकसान नहीं: तयम्मुम जायज़ नहीं।',bn:'প্রথম অবস্থা: হালকা অসুস্থতা — মাথাব্যথা, দাঁতব্যথা — পানিতে ক্ষতি নেই: তায়াম্মুম জায়েজ নয়।',id:'Kasus 1: Penyakit ringan — sakit kepala, sakit gigi — air tidak berbahaya: tayammum TIDAK boleh.',ms:'Kes 1: Penyakit ringan — sakit kepala, sakit gigi — air tidak berbahaya: tayammum TIDAK boleh.',tr:'Durum 1: Hafif hastalık — baş ağrısı, diş ağrısı — su zararlı değil: teyemmüm CAİZ DEĞİL.'}},
{type:'c',text:{ar:'الحالة الثانية: وإن كان به مرض يخاف معه تلف النفس، أو تلف عضو أو حدوث مرض - فهذا يجوز له التيمم لقوله تعالى: ﴿وَلَا تَقْتُلُوا أَنفُسَكُمْ إِنَّ اللَّهَ كَانَ بِكُمْ رَحِيمًا﴾ [النساء: ٢٩]',en:'Case 2: Disease where water risks loss of life, a limb, or onset of another illness — tayammum IS permitted. ❝Do not kill yourselves. Allah is Merciful to you.❞ [4:29]',ur:'دوسری حالت: بیماری جس میں پانی سے جان، عضو یا نئی بیماری کا خوف ہو — تیمم جائز ہے۔ ﴿اپنے آپ کو قتل مت کرو﴾ [النساء:29]',fa:'حالت دوم: بیماری با خطر جان یا عضو — تیمم جائز است. ﴿خود را نکشید، خدا مهربان است﴾ [نساء:29]',fr:'Cas 2 : Maladie risquant la vie ou un membre — tayammum PERMIS. ❝Ne vous tuez pas. Allah est Miséricordieux.❞ [4:29]',hi:'दूसरी अवस्था: पानी से जान या अंग का खतरा — तयम्मुम जायज़। ❝खुद को मत मारो, अल्लाह रहीम है।❞ [4:29]',bn:'দ্বিতীয় অবস্থা: পানিতে প্রাণ বা অঙ্গের ভয় — তায়াম্মুম জায়েজ। ❝নিজেদের হত্যা করো না।❞ [4:29]',id:'Kasus 2: Penyakit risiko jiwa atau anggota — tayammum BOLEH. ❝Jangan bunuh diri. Allah Penyayang.❞ [4:29]',ms:'Kes 2: Penyakit risiko jiwa atau anggota — tayammum BOLEH. ❝Jangan bunuh diri. Allah Penyayang.❞ [4:29]',tr:'Durum 2: Can veya uzuv riski — teyemmüm CAİZ. ❝Kendinizi öldürmeyin. Allah merhametlidir.❞ [4:29]'}},
{type:'c',text:{ar:'الحالة الثالثة: وإن كان به مرض لا يقدر معه على الحركة ولا يجد من يناوله الماء - جاز له التيمم فإن كان لا يستطيع التيمم يممه غيره، وإن تلوث بدنه أو ملابسه أو فراشه بالنجاسة ولم يستطع إزالتها - جاز له الصلاة على حالته. ولا يجوز له تأخير الصلاة عن وقتها بأي حال.',en:'Case 3: Cannot move and no one brings water — tayammum is permitted; another person may do it. If body/clothes are soiled and cannot be cleaned — prayer in that state is valid. Prayer must NEVER be delayed beyond its time.',ur:'تیسری حالت: حرکت سے عاجز اور پانی لانے والا نہیں — تیمم جائز، کوئی دوسرا بھی کرا سکتا ہے۔ نجاست دور نہ ہو سکے — اسی حالت میں نماز جائز۔ نماز کسی بھی حال میں وقت سے مؤخر نہیں کی جائے گی۔',fa:'حالت سوم: نمی‌تواند حرکت کند و آب نیست — تیمم جائز، دیگری انجام دهد. نجاست دور نشود — نماز در همان حال جائز است. تأخیر نماز از وقت جائز نیست.',fr:'Cas 3 : Immobilisé sans eau — tayammum permis par quelqu\'un d\'autre. Corps souillé non nettoyable — prière en cet état valide. Jamais retarder la prière.',hi:'तीसरी अवस्था: हरकत से अक्षम, पानी लाने वाला नहीं — तयम्मुम जायज़, दूसरा भी करा सकता है। नजासत दूर न हो — उसी हालत में नमाज़ जायज़। नमाज़ वक़्त से कभी न छोड़ें।',bn:'তৃতীয় অবস্থা: নড়াচড়া করতে পারে না, পানি আনার কেউ নেই — তায়াম্মুম জায়েজ। নাজাসাত দূর না হলে সেই অবস্থায় নামায জায়েজ। নামায কখনো সময়ের পরে নয়।',id:'Kasus 3: Tidak bisa bergerak, tak ada yang membawa air — tayammum boleh oleh orang lain. Najis tidak bisa dibersihkan — shalat tetap sah. Jangan menunda shalat.',ms:'Kes 3: Tidak boleh bergerak, tiada yang membawa air — tayammum boleh oleh orang lain. Najis tidak boleh dibersihkan — solat tetap sah. Jangan tangguhkan solat.',tr:'Durum 3: Hareket edemez, su getirecek yok — başkası teyemmüm yapabilir. Necaset temizlenemiyorsa — o halde namaz geçerli. Namazı asla erteleme.'}},
{type:'c',text:{ar:'الحالة الرابعة: من به جروح أو قروح أو كسر أو مرض يضره استعمال الماء - جاز له التيمم، وإن أمكنه غسل الصحيح من جسده وجب عليه ذلك وتيمم للباقي. وإن كان عليه جبيرة يحتاج إلى بقائها مسح عليها، وإن كان المسح يضره تيمم عنها. ويبطل التيمم بكل ما يبطل به الوضوء، وبالقدرة على استعمال الماء، والله أعلم.',en:'Case 4: Wounds, sores, fractures, or illness worsened by water — tayammum is permitted. Must wash healthy parts of body; tayammum for the rest. If a splint must remain — wipe over it; if wiping harms — tayammum instead. Tayammum is nullified by what nullifies wudu and by ability to use water. Allah knows best.',ur:'چوتھی حالت: زخم، فریکچر، یا پانی سے نقصان — تیمم جائز۔ صحیح حصہ دھونا واجب، باقی کے لیے تیمم۔ پٹی پر مسح، مسح نقصان دہ ہو تو تیمم۔ تیمم وضو توڑنے والی چیزوں سے اور پانی کی قدرت سے ٹوٹ جاتا ہے۔ واللہ اعلم۔',fa:'حالت چهارم: زخم، شکستگی، پانی مضر — تیمم جائز. اعضای سالم باید شسته شود. روی باند مسح کند، اگر ضرر دارد تیمم. تیمم با همان موارد وضو و با توانایی استفاده از آب باطل می‌شود. والله اعلم.',fr:'Cas 4 : Blessures, fractures, eau nuisible — tayammum. Laver les parties saines. Masser l\'attelle ou tayammum si nuisible. Annulé par ce qui invalide le wudu ou par l\'accès à l\'eau. Allah sait mieux.',hi:'चौथी अवस्था: जख्म, फ्रैक्चर, पानी से नुकसान — तयम्मुम जायज़। स्वस्थ हिस्सा धोना वाजिब। पट्टी पर मसह, नुकसान हो तो तयम्मुम। वुज़ू तोड़ने वाली चीज़ों और पानी की क़ुदरत से टूट जाता है। वल्लाहु अअलम।',bn:'চতুর্থ অবস্থা: ক্ষত, ভাঙা হাড়, পানিতে ক্ষতি — তায়াম্মুম। সুস্থ অংশ ধোয়া ওয়াজিব। ব্যান্ডেজে মসেহ, ক্ষতিকর হলে তায়াম্মুম। ওযু ভাঙার কারণে বাতিল হয়। আল্লাহু আলাম।',id:'Kasus 4: Luka, patah tulang, air berbahaya — tayammum. Basuh bagian sehat. Usap gips; jika berbahaya, tayammum. Batal oleh yang membatalkan wudu dan kemampuan pakai air. Wallahu a\'lam.',ms:'Kes 4: Luka, patah tulang, air berbahaya — tayammum. Basuh bahagian sihat. Sapu gips; jika berbahaya, tayammum. Batal oleh yang membatalkan wudu. Wallahu a\'lam.',tr:'Durum 4: Yara, kırık, su zararlı — teyemmüm. Sağlıklı kısımları yıka. Alçıya meshset; zararlıysa teyemmüm. Abdesti bozan şeylerle ve suya gücü yetmekle bozulur. Allah bilir.'}}
]},

title:{ar:'كيفية صلاة المريض',ur:'بیمار کی نماز کا طریقہ',fa:'کیفیت نماز بیمار',en:'How the Patient Performs Prayer',fr:'Comment le malade effectue la prière',hi:'बीमार की नमाज़ का तरीका',bn:'রোগীর নামাযের পদ্ধতি',id:'Cara Shalat Orang Sakit',ms:'Cara Solat Orang Sakit',tr:'Hastanın Namaz Kılma Şekli'},
blocks:[
{type:'h',text:{ar:'أجمع أهل العلم على أن من لا يستطيع القيام له أن يصلي جالساً، فإن عجز عن الصلاة جالساً فإنه يصلي على جنبه مستقبل القبلة بوجهه، والمستحب أن يكون على جنبه الأيمن فإن عجز عن الصلاة على جنبه صلى مستلقياً؛ لقوله ﷺ: «لعمران بن حصين صل قائماً، فإن لم تستطع فقاعداً، فإن لم تستطع فعلى جنب» (رواه البخاري، وزاد النسائي: «فإن لم تستطع فمستلقياً»).',en:'Scholars agree: unable to stand → pray seated. Unable to sit → pray on side facing qibla (right side preferred). Unable → pray lying on back. The Prophet ﷺ told Imran ibn Husayn: "Pray standing; if not, seated; if not, on your side." [Bukhari] Al-Nasa\'i added: "If not, lying on your back."',ur:'علماء کا اجماع: کھڑا نہیں → بیٹھ کر۔ بیٹھا نہیں → قبلہ رخ کروٹ (دائیں کروٹ مستحب)۔ کروٹ نہیں → لیٹ کر۔ آپ ﷺ نے عمران بن حصین سے فرمایا: «کھڑے ہو کر، نہ ہو تو بیٹھ کر، نہ ہو تو کروٹ لے کر» [بخاری]۔ نسائی: «نہ ہو تو لیٹ کر»۔',fa:'اجماع علما: ایستادن ممکن نیست → نشسته. نشستن نیست → به پهلو رو به قبله (پهلوی راست مستحب). پهلو نیست → طاق‌باز. پیامبر ﷺ به عمران: «ایستاده، اگر نشد نشسته، اگر نشد پهلو» [بخاری]. نسائی: «اگر نشد طاق‌باز».',fr:'Consensus : ne peut se lever → prie assis. Ne peut s\'asseoir → côté droit face à la qibla. Ne peut → sur le dos. Nabi ﷺ à Imran: "Debout; sinon assis; sinon sur le côté." [Bukhari] Al-Nasai: "sinon allongé."',hi:'इजमा: खड़ा नहीं → बैठकर। बैठा नहीं → क़िबला रुख दाईं करवट। करवट नहीं → लेटकर। नबी ﷺ ने इमरान से: «खड़े, नहीं तो बैठ, नहीं तो करवट» [बुखारी]। नसाई: «नहीं तो लेट कर»।',bn:'ইজমা: দাঁড়াতে পারে না → বসে। বসতে পারে না → ডান কাত কিবলামুখী। না পারলে → চিৎ হয়ে। নবী ﷺ ইমরানকে: «দাঁড়িয়ে, না পারলে বসে, না পারলে কাত হয়ে» [বুখারী]। নাসাঈ: «না পারলে চিৎ হয়ে»।',id:'Kesepakatan ulama: tidak bisa berdiri → shalat duduk. Tidak bisa duduk → berbaring menyamping ke kiblat (kanan lebih utama). Tidak bisa → telentang. Nabi ﷺ kepada Imran: "Berdiri; jika tidak, duduk; jika tidak, berbaring." [Bukhari] Nasai: "jika tidak, telentang."',ms:'Kesepakatan ulama: tidak boleh berdiri → solat duduk. Tidak boleh duduk → berbaring menghadap kiblat (kanan lebih afdal). Tidak boleh → telentang. Nabi ﷺ kepada Imran: "Berdiri; jika tidak, duduk; jika tidak, berbaring miring." [Bukhari] Nasai: "jika tidak, telentang."',tr:'Ulema ittifakı: ayakta duramayan → oturarak. Oturamayan → kıbleye dönük yan yatar (sağ taraf tercih). Bunun gücü yok → sırt üstü. Peygamber ﷺ Imran\'a: "Ayakta; gücün yetmezse otur; yetmezse yan yat." [Buharî] Nesaî: "yetmezse sırt üstü."'}},
{type:'r',text:{ar:'ومن قدر على القيام وعجز عن الركوع أو السجود لم يسقط عنه القيام، بل يصلي قائماً فيومئ بالركوع، ثم يجلس ويومي بالسجود؛ لقوله تعالى: ﴿وَقُومُوا لِلَّهِ قَانِتِينَ﴾ [البقرة: ٢٣٨]. ومن عجز عن الركوع والسجود أوما بهما، ويجعل السجود أخفض من الركوع. وإن لم يمكنه أن يحني ظهره فصار كأنه راكع فمتى أراد الركوع زاد في انحنائه قليلاً، ويقرب وجهه إلى الأرض في السجود أكثر ما أمكنه.',en:'Can stand but cannot bow/prostrate — standing is not waived. Pray standing, indicate ruku with head nod, then sit and indicate sujud. [2:238] If neither bowing nor prostrating — indicate both; prostration indication must be lower than bowing. If back is already hunched — incline slightly more for ruku, bring face closer to ground for sujud.',ur:'کھڑا ہو سکتا ہے لیکن رکوع/سجدہ نہیں — قیام ساقط نہیں۔ کھڑے ہو کر رکوع کا اشارہ، پھر بیٹھ کر سجدے کا۔ [البقرہ:238] دونوں سے عاجز — اشارہ کرے، سجدہ رکوع سے کم ہو۔ کمر جھکی ہو — رکوع میں تھوڑا مزید جھکے، سجدہ میں زیادہ۔',fa:'می‌تواند بایستد اما رکوع/سجده نمی‌تواند — قیام ساقط نمی‌شود. ایستاده اشاره رکوع کند، سپس بنشیند اشاره سجده. [بقره:238] اگر هر دو ممکن نیست اشاره کند، سجده پایین‌تر از رکوع. اگر کمر کج است کمی بیشتر خم شود.',fr:'Peut se lever mais pas s\'incliner/se prosterner — debout maintenu. Debout → indiquer le ruku, assis → indiquer le sujud. [2:238] Ni l\'un ni l\'autre → indiquer les deux; prosternation plus basse. Dos voûté → incliner un peu plus pour le ruku.',hi:'खड़ा हो सकता है लेकिन रुकू/सजदा नहीं — क़याम साकित नहीं। खड़े होकर रुकू का इशारा, फिर बैठकर सजदे का। [2:238] दोनों से आजिज़ — इशारा, सजदा रुकू से कम। कमर पहले से झुकी — और थोड़ा झुके।',bn:'দাঁড়াতে পারে কিন্তু রুকু/সিজদা পারে না — কিয়াম বাদ পড়ে না। দাঁড়িয়ে রুকুর ইশারা, বসে সিজদার। [2:238] দুটোই পারে না — উভয়ের ইশারা, সিজদা কম। কোমর ঝুঁকা — আরো একটু ঝোঁকো।',id:'Bisa berdiri tapi tidak bisa ruku/sujud — berdiri tetap. Berdiri → isyarat ruku, duduk → isyarat sujud. [2:238] Keduanya tidak bisa → isyarat keduanya; sujud lebih rendah. Punggung bungkuk → sedikit lebih condong.',ms:'Boleh berdiri tapi tidak boleh ruku/sujud — berdiri kekal. Berdiri → isyarat ruku, duduk → isyarat sujud. [2:238] Kedua-duanya tidak boleh → isyarat kedua-duanya; sujud lebih rendah. Belakang bongkok → condong sedikit lagi.',tr:'Ayakta durabilip eğilip secde edemeyense — kıyam düşmez. Ayakta rükuya işaret, oturarak secdeye işaret. [2:238] Her ikisi de olmazsa — işaret eder; secde işareti daha alçak. Sırt zaten eğikse — biraz daha eğilir.'}},
{type:'r',text:{ar:'ومن لم يقدر على الإيماء برأسه كفاه النية والقول. ولا تسقط عنه الصلاة ما دام عقله ثابتاً بأي حال من الأحوال. ومتى قدر المريض في أثناء الصلاة على ما كان عاجزاً عنه انتقل إليه، وبنى على ما مضى من صلاته.',en:'Cannot even nod — intention and verbal recitation suffice. Prayer is NEVER waived as long as mentally sound. If the patient gains ability mid-prayer to do what he could not — he switches to it and continues.',ur:'سر سے اشارہ بھی نہ ہو سکے — نیت اور قول کافی ہیں۔ عقل سلامت ہو تو نماز کسی بھی حال میں معاف نہیں۔ نماز کے درمیان قادر ہو جائے — منتقل ہو جائے اور پچھلی نماز پر بنا کرے۔',fa:'حتی اشاره با سر نمی‌تواند — نیت و گفتار کافی است. نماز هرگز ساقط نمی‌شود تا عقل سالم است. اگر در اثنای نماز توانایی یافت انتقال دهد.',fr:'Ne peut même pas hocher la tête — intention et dit suffisent. Jamais dispensé de la prière tant que mentalement sain. Si une capacité est retrouvée en cours de prière → l\'adopter.',hi:'सर से भी इशारा न हो — नीयत और क़ौल काफी। अक़्ल सलामत हो तो नमाज़ कभी माफ नहीं। नमाज़ के बीच क़ादिर हो जाए — उसी पर चला जाए।',bn:'মাথার ইশারাও না হলে — নিয়ত ও উচ্চারণ যথেষ্ট। বিবেক থাকলে নামায কখনো মাফ নয়। নামাযের মাঝে সক্ষম হলে সেটায় যাবে।',id:'Bahkan tidak bisa mengangguk — niat dan ucapan cukup. Shalat tidak pernah gugur selama akal sehat. Jika mampu saat shalat → beralih.',ms:'Bahkan tidak boleh mengangguk — niat dan ucapan cukup. Solat tidak pernah gugur selama akal sihat. Jika mampu semasa solat → beralih.',tr:'Baş sallayamıyorsa — niyet ve söz yeterli. Aklı başında olduğu sürece namaz hiçbir zaman düşmez. Namaz sırasında güç gelirse → o hale geçer.'}},
{type:'h',text:{ar:'وإذا نام المريض أو غيره عن صلاة أو نسيها وجب عليه أن يصليها حال استيقاظه عن النوم، أو حال ذكره لها، ولا يجوز له تركها إلى دخول وقت مثلها؛ لقوله ﷺ: «من نام عن صلاة أو نسيها فليصلها متى ذكرها، لا كفارة لها إلا ذلك» وتلا قوله تعالى: ﴿وَأَقِمِ الصَّلَاةَ لِذِكْرِي﴾ [طه: ١٤]',en:'If the patient sleeps through or forgets a prayer — pray it immediately upon waking or remembering. Cannot leave it until next time. The Prophet ﷺ: "Whoever sleeps through or forgets a prayer, let him pray when he remembers — there is no expiation except that." He recited: ❝Establish prayer for My remembrance.❞ [20:14]',ur:'سو جائے یا بھول جائے — بیداری یا یادآوری پر فوراً پڑھے۔ اگلی بار تک چھوڑنا جائز نہیں۔ آپ ﷺ: «جب یاد آئے پڑھے، اس کا کفارہ بس یہی ہے»۔ آیت: ﴿میری یاد کے لیے نماز قائم کرو﴾ [طہ:14]',fa:'اگر بخواهد یا فراموش کند — با یادآوری فوری بخواند. پیامبر ﷺ: «هروقت یادش آمد بخواند» و تلاوت کرد: ﴿نماز را برای یاد من برپا دار﴾ [طه:14]',fr:'Dort ou oublie la prière → la prier dès le réveil ou le souvenir. Nabi ﷺ : « Qu\'il prie quand il s\'en souvient. » Et : ❝Établis la prière en Mon souvenir.❞ [20:14]',hi:'सो जाए या भूल जाए — जागते या याद आते ही पढ़े। नबी ﷺ: «याद आते ही पढ़े»। आयत: ❝मेरी याद के लिए नमाज़ क़ायम करो।❞ [ताहा:14]',bn:'ঘুমিয়ে বা ভুলে যায় — জাগা বা স্মরণ হলেই পড়বে। নবী ﷺ: «মনে হলেই পড়ুক»। আয়াত: ❝আমার স্মরণে নামায কায়েম করো।❞ [তা-হা:১৪]',id:'Tertidur atau lupa → shalat segera setelah ingat. Nabi ﷺ: "Shalatkan ketika ingat." Dan: ❝Dirikanlah shalat untuk mengingat-Ku.❞ [20:14]',ms:'Tertidur atau terlupa → solat segera setelah ingat. Nabi ﷺ: "Solatkan ketika ingat." Dan: ❝Dirikanlah solat untuk mengingati-Ku.❞ [20:14]',tr:'Uyuyarak veya unutarak geçirse → hatırladığında kılar. Peygamber ﷺ: "Hatırladığında kılsın." Ve: ❝Beni anmak için namaz kıl.❞ [20:14]'}}
]}

title:{ar:'أهمية الصلاة وأحكام الجمع',ur:'نماز کی اہمیت اور جمع',fa:'اهمیت نماز و احکام جمع',en:'Importance of Prayer & Combining',fr:'Importance de la prière et combinaison',hi:'नमाज़ की अहमियत और जमा',bn:'নামাযের গুরুত্ব ও জমা',id:'Pentingnya Shalat dan Menjama',ms:'Kepentingan Solat dan Jamak',tr:'Namazın Önemi ve Birleştirme'},
blocks:[
{type:'i',text:{ar:'يجب على المريض أن يؤدي الصلاة في وقتها حسب استطاعته، فإذا تركها عامداً وهو عاقل مكلف يقوى على أدائها أو إيماء فهو آثم، وقد ذهب جمع من أهل العلم إلى كفره بذلك.',en:'The patient must pray at its time according to ability. Intentionally abandoning prayer while capable — even by gesture — is sinful; many scholars consider it an act of disbelief.',ur:'مریض پر واجب ہے کہ نماز اپنے وقت میں ادا کرے۔ قصداً چھوڑنا گناہ ہے؛ علماء کی جماعت نے اسے کفر قرار دیا ہے۔',fa:'بر بیمار واجب است نماز را در وقتش بخواند. ترک عمدی گناه است و گروهی از علما آن را کفر دانسته‌اند.',fr:'Le malade doit prier en son temps. L\'abandonner volontairement est un péché; plusieurs savants le considèrent incrédulité.',hi:'मरीज़ पर वाजिब है नमाज़ वक़्त पर अदा करे। जानबूझकर छोड़ना गुनाह है, उलमा ने कुफ्र बताया।',bn:'রোগীর ওয়াজিব সময়মতো নামায আদায় করা। ইচ্ছাকৃতভাবে ছাড়া গুনাহ; আলেমরা কুফর বলেছেন।',id:'Pasien wajib shalat pada waktunya. Meninggalkannya sengaja adalah dosa; sebagian ulama menganggapnya kufur.',ms:'Pesakit wajib solat pada waktunya. Meninggalkannya sengaja adalah dosa; sebahagian ulama menganggapnya kufur.',tr:'Hasta namazı vaktinde kılmalıdır. Kasıtla terk etmek günahtır; birçok âlim bunu küfür saymıştır.'}},
{type:'h',text:{ar:'قال النبي ﷺ: «الْعَهْدُ الَّذِي بَيْنَنَا وَبَيْنَهُمُ الصَّلَاةُ، فَمَنْ تَرَكَهَا فَقَدْ كَفَرَ».',en:'The Prophet ﷺ said: "The covenant between us and them is prayer; whoever abandons it has committed disbelief."',ur:'نبی ﷺ نے فرمایا: «ہمارے اور ان کے درمیان عہد نماز ہے، جس نے اسے چھوڑا اس نے کفر کیا»۔',fa:'پیامبر ﷺ فرمود: «پیمان بین ما و آنان نماز است، هر کس آن را ترک کند کافر شده».',fr:'Le Prophète ﷺ dit: «L\'alliance entre nous et eux est la prière; quiconque l\'abandonne a commis l\'incrédulité.»',hi:'नबी ﷺ ने फरमाया: «हमारे और उनके बीच अहद नमाज़ है, जिसने छोड़ा कुफ्र किया»।',bn:'নবী ﷺ বলেন: «আমাদের ও তাদের চুক্তি নামায; যে ছেড়ে দিল কুফরী করল»।',id:'Nabi ﷺ bersabda: "Perjanjian antara kami dan mereka adalah shalat; barang siapa meninggalkannya maka ia kafir."',ms:'Nabi ﷺ bersabda: "Perjanjian antara kami dan mereka ialah solat; sesiapa yang meninggalkannya maka dia kafir."',tr:'Peygamber ﷺ buyurdu: "Bizimle onlar arasındaki sözleşme namazdır; onu terk eden küfre girmiştir."'}},
{type:'h',text:{ar:'وقال ﷺ: «رَأْسُ الْأَمْرِ الْإِسْلَامُ، وَعَمُودُهُ الصَّلَاةُ، وَذِرْوَةُ سَنَامِهِ الْجِهَادُ فِي سَبِيلِ اللَّهِ».',en:'He ﷺ said: "The head of the matter is Islam, its pillar is prayer, and its peak is striving in the cause of Allah."',ur:'آپ ﷺ نے فرمایا: «معاملے کی اصل اسلام، ستون نماز، اور چوٹی اللہ کی راہ میں جہاد»۔',fa:'فرمود ﷺ: «سر امر اسلام، ستونش نماز، قله‌اش جهاد در راه خدا».',fr:'Il ﷺ dit: «La tête de la chose est l\'Islam, son pilier la prière, et son sommet le djihad dans la voie d\'Allah.»',hi:'आप ﷺ ने फरमाया: «मामले की जड़ इस्लाम, स्तंभ नमाज़, चोटी जिहाद फी सबीलिल्लाह»।',bn:'তিনি ﷺ বললেন: «মূল ইসলাম, স্তম্ভ নামায, শীর্ষ আল্লাহর পথে জিহাদ»।',id:'"Pokok segala urusan adalah Islam, tiangnya shalat, dan puncaknya jihad di jalan Allah." ﷺ',ms:'"Pokok segala urusan ialah Islam, tiangnya solat, dan puncaknya jihad di jalan Allah." ﷺ',tr:'O ﷺ buyurdu: "İşin başı İslam, direği namazdır, zirvesi Allah yolunda cihaddır."'}},
{type:'h',text:{ar:'وقال ﷺ: «بَيْنَ الرَّجُلِ وَبَيْنَ الشِّرْكِ وَالْكُفْرِ تَرْكُ الصَّلَاةِ» (أخرجه مسلم). وهذا القول أصح للآيات القرآنية والأحاديث المذكورة.',en:'"Between a man and shirk and disbelief is the abandonment of prayer." [Muslim] — the most correct opinion, supported by the Quranic verses and hadiths mentioned.',ur:'«آدمی اور شرک و کفر کے درمیان نماز کا چھوڑنا ہے» [مسلم]۔ یہ قول آیات قرآنی اور احادیث کی روشنی میں زیادہ صحیح ہے۔',fa:'«بین مرد و شرک و کفر ترک نماز است» [مسلم]. این قول با آیات و احادیث صحیح‌تر است.',fr:'«Entre l\'homme et le polythéisme se trouve l\'abandon de la prière.» [Muslim] — l\'opinion la plus correcte.',hi:'«आदमी और शिर्क व कुफ्र के बीच नमाज़ का छोड़ना है» [मुस्लिम]।',bn:'«মানুষ ও শিরক-কুফরের মধ্যে পার্থক্য নামায ছেড়ে দেওয়া» [মুসলিম]।',id:'"Antara seseorang dengan syirik dan kekafiran adalah meninggalkan shalat." [Muslim]',ms:'"Antara seseorang dengan syirik dan kekufuran adalah meninggalkan solat." [Muslim]',tr:'"Bir kişi ile şirk ve küfür arasındaki fark namazı terk etmektir." [Müslim]'}},
{type:'r',text:{ar:'وإن شق عليه فعل كل صلاة في وقتها فله الجمع بين الظهر والعصر، وبين المغرب والعشاء جمع تقديم أو جمع تأخير حسبما يتيسر له. أما الفجر فلا تجمع لما قبلها، ولا لما بعدها؛ لأن وقتها منفصل عما قبلها وعما بعدها.',en:'If praying each prayer at its time is difficult — combining Dhuhr+Asr, and Maghrib+Isha is permitted (advance or delay, whichever is easier). Fajr cannot be combined with any other prayer; its time is independent.',ur:'ہر نماز اپنے وقت پر مشکل ہو تو: ظہر+عصر اور مغرب+عشاء کو جمع کرے — تقدیم یا تاخیر۔ فجر کو نہ پہلے نہ بعد کی نماز سے جمع کیا جائے۔',fa:'اگر هر نماز در وقتش دشوار است: ظهر+عصر و مغرب+عشا جمع کند — تقدیم یا تأخیر. فجر با قبل یا بعد جمع نمی‌شود.',fr:'Si prier chaque prière en son temps est difficile, combiner Dhuhr+Asr et Maghrib+Isha est permis. Le Fajr ne se combine pas.',hi:'हर नमाज़ मुश्किल हो तो: ज़ुहर+अस्र और मग़रिब+इशा जमा करे। फज्र को जमा नहीं किया जाए।',bn:'প্রতিটি নামায কঠিন হলে: যুহর+আসর এবং মাগরিব+ইশা জমা। ফজর জমা করা যাবে না।',id:'Jika sulit shalat di waktunya — boleh menjama Dhuhr+Ashar dan Maghrib+Isya. Shubuh tidak bisa dijama.',ms:'Jika sukar solat pada waktunya — boleh menjamak Zohor+Asar dan Maghrib+Isyak. Subuh tidak boleh dijamakkan.',tr:'Her namazı vaktinde kılmak zor geliyorsa: Öğle+İkindi ve Akşam+Yatsıyı birleştirebilir. Sabah namazı birleştirilemez.'}},
{type:'r',text:{ar:'هذا بعض ما يتعلق بأحوال المريض في طهارته وصلاته. وأسأل الله أن يشفى مرضى المسلمين ويكفر سيئاتهم، وأن يمن علينا بالعفو والعافية في الدنيا والآخرة، إنه جواد كريم، وصلى الله على نبينا محمد وعلى آله وأصحابه أجمعين وأتباعه بإحسان إلى يوم الدين.',en:'This covers some rulings on the patient\'s purification and prayer. We ask Allah to heal the sick Muslims, forgive their sins, and grant us pardon and well-being in this world and the next. He is Most Generous. May peace and blessings be upon our Prophet Muhammad, his family, companions and all followers until the Day of Judgment.',ur:'یہ مریض کی طہارت اور نماز کے چند احکام تھے۔ اللہ سے دعا ہے مسلمان مریضوں کو شفا دے، گناہ معاف کرے، دنیا و آخرت میں عفو و عافیت دے۔',fa:'این برخی احکام مریض در طهارت و نماز است. از الله می‌خواهیم مریضان مسلمان را شفا دهد و گناهانشان را بیامرزد.',fr:'Voici quelques règles sur la purification et la prière du malade. Nous demandons à Allah de guérir les malades et de nous accorder bien-être en ce monde et dans l\'au-delà.',hi:'ये मरीज़ की तहारत और नमाज़ के कुछ अहकाम हैं। अल्लाह से दुआ है मरीज़ों को शिफा दे और अफ्व व आफियत अता करे।',bn:'এগুলো রোগীর পবিত্রতা ও নামাযের কিছু বিধান। আল্লাহর কাছে দোয়া রোগীদের সুস্থ করুন এবং আমাদের ক্ষমা ও সুস্বাস্থ্য দিন।',id:'Ini sebagian hukum berkaitan keadaan pasien dalam bersuci dan shalat. Kami memohon kepada Allah agar menyembuhkan orang sakit dan memberikan ampunan serta kesehatan.',ms:'Ini sebahagian hukum berkaitan keadaan pesakit dalam bersuci dan solat. Kami memohon kepada Allah agar menyembuhkan orang sakit dan mengurniakan kemaafan dan kesihatan.',tr:'Bunlar hastanın temizlik ve namazına dair bazı hükümlerdir. Allah\'tan hasta Müslümanlara şifa, hepimize af ve afiyet vermesini dileriz.'}}

title:{ar:'رقية المريض',ur:'مریض کی رقیہ',fa:'رقیه بیمار',en:'Ruqyah for the Patient',fr:'Ruqya pour le malade',hi:'मरीज़ की रुकया',bn:'রোগীর রুকইয়া',id:'Ruqyah untuk Orang Sakit',ms:'Ruqyah untuk Pesakit',tr:'Hasta için Rukye'},

{type:'i',text:{ar:'أخبر النبي ﷺ أن لكل داء دواء. ومن أعظم الأدوية الربانية الآيات القرآنية والأدعية النبوية. قال تعالى: ﴿وَنُنَزِّلُ مِنَ الْقُرْآنِ مَا هُوَ شِفَاءٌ وَرَحْمَةٌ لِلْمُؤْمِنِينَ﴾ [الإسراء: ٨٢] وقال: ﴿قُلْ هُوَ لِلَّذِينَ آمَنُوا هُدًى وَشِفَاءٌ﴾ [فصلت: ٤٤].',en:'The Prophet ﷺ informed that every disease has a cure. Among the greatest divine remedies are Quranic verses and Prophetic supplications. Allah says: ❝We send down of the Quran that which is a healing and mercy for the believers.❞ [17:82] And: ❝Say: it is for those who believe, a guidance and healing.❞ [41:44]',ur:'نبی ﷺ نے بتایا ہر بیماری کی دوا ہے۔ عظیم ترین دوائیں قرآنی آیات اور نبوی دعائیں ہیں۔ ﴿ہم قرآن سے نازل کرتے ہیں جو مومنوں کے لیے شفا اور رحمت ہے﴾ [الإسراء:82] اور ﴿مومنوں کے لیے ہدایت اور شفا ہے﴾ [فصلت:44].',fa:'پیامبر ﷺ فرمود هر دردی درمانی دارد. از بزرگ‌ترین داروها آیات قرآن است. ﴿نازل می‌کنیم از قرآن آنچه شفا و رحمت مؤمنان است﴾ [اسراء:82] و ﴿برای مؤمنان هدایت و شفاست﴾ [فصلت:44].',fr:'Le Prophète ﷺ a dit que toute maladie a un remède. Parmi les plus grands remèdes: les versets coraniques. Allah dit: ❝Nous faisons descendre du Coran guérison et miséricorde pour les croyants.❞ [17:82]',hi:'नबी ﷺ ने बताया हर बीमारी की दवा है। अज़ीम दवाएं क़ुरआनी आयतें हैं। ﴿हम क़ुरआन से उतारते हैं जो शिफा और रहमत है﴾ [17:82] और ﴿हिदायत और शिफा मोमिनों के लिए﴾ [41:44]।',bn:'নবী ﷺ জানিয়েছেন প্রতিটি রোগের ওষুধ আছে। শ্রেষ্ঠ ওষুধ কুরআনের আয়াত। ﴿আমি কুরআন থেকে নাযিল করি শিফা ও রহমত﴾ [17:82] এবং ﴿মুমিনদের জন্য হেদায়াত ও শিফা﴾ [41:44]।',id:'Nabi ﷺ mengatakan setiap penyakit ada obatnya. Obat terbesar: ayat Al-Quran. Allah berfirman: ❝Kami turunkan dari Al-Quran penyembuh dan rahmat bagi orang mukmin.❞ [17:82]',ms:'Nabi ﷺ mengatakan setiap penyakit ada ubatnya. Ubat terbesar: ayat Al-Quran. Allah berfirman: ❝Kami turunkan dari Al-Quran penyembuh dan rahmat bagi orang mukmin.❞ [17:82]',tr:'Peygamber ﷺ her hastalığın devası olduğunu bildirdi. En büyük ilaç Kur\'an ayetleridir. ❝Biz Kur\'an\'dan mü\'minler için şifa ve rahmet olan şeyler indiririz.❞ [17:82]'}},
{type:'r',text:{ar:'١ـ قراءة فاتحة الكتاب (مرة أو سبع مرات). ٢ـ قراءة المعوذتين — سورة الفلق وسورة الناس (ثلاث مرات).',en:'1. Recite Surah Al-Fatiha (once or seven times). 2. Recite Al-Mu\'awwidhatain — Surah Al-Falaq and Surah An-Nas (three times).',ur:'١۔ سورۃ الفاتحہ (ایک یا سات مرتبہ)۔ ٢۔ معوذتین — سورۃ الفلق اور سورۃ الناس (تین مرتبہ)۔',fa:'١. تلاوت سوره فاتحه (یک یا هفت بار). ٢. معوذتین (فلق و ناس) سه بار.',fr:'1. Réciter Al-Fatiha (une ou sept fois). 2. Réciter Al-Mu\'awwidhatain — Al-Falaq et An-Nas (trois fois).',hi:'१. सूरह अल-फातिहा (एक या सात बार)। २. मुअव्विज़तैन — अल-फलक़ और अन-नास (तीन बार)।',bn:'১. সূরা আল-ফাতিহা (একবার বা সাতবার)। ২. মু\'আওয়িযাতাইন — সূরা আল-ফালাক ও সূরা আন-নাস (তিনবার)।',id:'1. Baca Al-Fatihah (sekali atau tujuh kali). 2. Baca Al-Mu\'awwidhatain — Al-Falaq dan An-Nas (tiga kali).',ms:'1. Baca Al-Fatihah (sekali atau tujuh kali). 2. Baca Al-Mu\'awwidhatain — Al-Falaq dan An-Nas (tiga kali).',tr:'1. Fatiha suresini oku (bir veya yedi kez). 2. Muavvizeteyn — Felak ve Nas surelerini oku (üç kez).'}},
{type:'r',text:{ar:'٣ـ يمسح بيده اليمنى على جسده ويقول: «أَذْهِبِ الْبَأْسَ رَبَّ النَّاسِ، وَاشْفِ أَنْتَ الشَّافِي، لَا شِفَاءَ إِلَّا شِفَاؤُكَ، شِفَاءً لَا يُغَادِرُ سَقَمًا». ٤ـ «أَسْأَلُ اللَّهَ الْعَظِيمَ رَبَّ الْعَرْشِ الْعَظِيمِ أَنْ يَشْفِيَكَ» (سبعاً).',en:'3. Wipe right hand over body saying: "Adhhib al-ba\'s, Rabb al-Nas, washfi Anta al-Shafi, la shifa\'a illa shifa\'uk, shifa\'an la yughadiru saqama." (Remove the pain, Lord of people; heal — You are the Healer; a healing leaving no illness.) 4. "As\'alu Allah al-\'Adhim Rabb al-\'Arsh al-\'Adhim an yashfiyak" — seven times. (I ask Allah the Magnificent, Lord of the Throne, to heal you.)',ur:'٣۔ داہنے ہاتھ سے جسم پر مسح کریں اور کہیں: «أَذْهِبِ الْبَأْسَ رَبَّ النَّاسِ، وَاشْفِ أَنْتَ الشَّافِي، لَا شِفَاءَ إِلَّا شِفَاؤُكَ، شِفَاءً لَا يُغَادِرُ سَقَمًا»۔ ٤۔ «أسأل اللہ العظیم رب العرش العظیم أن یشفیک» (سات مرتبہ)۔',fa:'٣. دست راست بر بدن بکشید: «أذهب البأس رب الناس، واشف أنت الشافي، لا شفاء إلا شفاؤك، شفاءً لا يغادر سقماً». ٤. «أسأل الله العظيم رب العرش العظيم أن يشفيك» (هفت بار).',fr:'3. Passer la main droite sur le corps en disant: «Adhhib al-ba\'s, Rabb al-Nas, washfi Anta al-Shafi...» (Éloigne la douleur, Seigneur des gens; Tu es le Guérisseur.) 4. «As\'alu Allah al-\'Adhim... an yashfiyak» — sept fois.',hi:'३. दाहिने हाथ से जिस्म पर मसह करें: «أَذْهِبِ الْبَأْسَ رَبَّ النَّاسِ، وَاشْفِ أَنْتَ الشَّافِي، لَا شِفَاءَ إِلَّا شِفَاؤُكَ»۔ ४. «अस्अलुल्लाहल अज़ीम रब्बल अर्शिल अज़ीम अन् यश्फियक» (सात बार)।',bn:'৩. ডান হাতে শরীরে মাসেহ করে বলুন: «أذهب البأس رب الناس، واشف أنت الشافي، لا شفاء إلا شفاؤك»। ৪. «أسأل الله العظيم رب العرش العظيم أن يشفيك» (সাতবার)।',id:'3. Usap tubuh dengan tangan kanan: «أذهب البأس رب الناس، واشف أنت الشافي، لا شفاء إلا شفاؤك، شفاءً لا يغادر سقماً». 4. "As\'alu Allah al-\'Adhim Rabb al-\'Arsh al-\'Adhim an yashfiyak" — tujuh kali.',ms:'3. Usap badan dengan tangan kanan: «أذهب البأس رب الناس، واشف أنت الشافي، لا شفاء إلا شفاؤك». 4. "As\'alu Allah al-\'Azim Rabb al-\'Arsy al-\'Azim an yashfiyak" — tujuh kali.',tr:'3. Sağ elinizi vücudunuza sürerken: «Adhhib el-be\'s, Rabben-Nas, vâşfi Ente\'ş-Şâfî, lâ şifâe illâ şifâuke...» deyin. 4. «Es\'elullâhel-azîm Rabbel-arşil-azîm en yeşfiyeke» — yedi kez.'}},
{type:'r',text:{ar:'٥ـ «بِسْمِ اللَّهِ أَرْقِيكَ مِنْ كُلِّ شَيْءٍ يُؤْذِيكَ، مِنْ شَرِّ كُلِّ نَفْسٍ أَوْ عَيْنِ حَاسِدٍ اللَّهُ يَشْفِيكَ، بِسْمِ اللَّهِ أَرْقِيكَ». ٦ـ ضع يدك على المكان المؤلم وقل «بِسْمِ اللَّهِ» ثلاثاً ثم «أَعُوذُ بِعِزَّةِ اللَّهِ وَقُدْرَتِهِ مِنْ شَرِّ مَا أَجِدُ وَأُحَاذِرُ» سبعاً.',en:'5. "Bismillah arqeek min kulli shay\'in yu\'dheek, min sharri kulli nafsin aw \'ayn hasidin Allah yashfeek, bismillah arqeek." (In Allah\'s name I perform ruqya for you from all that harms you; Allah heals you.) 6. Place hand on the painful area, say "Bismillah" three times, then "A\'udhu bi\'izzatillah wa qudratihi min sharri ma ajidu wa uhadhir" seven times.',ur:'٥۔ «بسم اللہ أرقيك من كل شيء يؤذيك، من شر كل نفس أو عين حاسد اللہ يشفيك، بسم اللہ أرقيك»۔ ٦۔ دردناک جگہ پر ہاتھ رکھیں، «بسم اللہ» تین مرتبہ پھر «أعوذ بعزة اللہ وقدرته من شر ما أجد وأحاذر» سات مرتبہ۔',fa:'٥. «بسم الله أرقيك من كل شيء يؤذيك، من شر كل نفس أو عين حاسد الله يشفيك». ٦. دست بر محل درد، «بسم الله» سه بار، سپس «أعوذ بعزة الله وقدرته من شر ما أجد وأحاذر» هفت بار.',fr:'5. «Bismillah arqeek min kulli shay\'in yu\'dheek... Allah yashfeek.» 6. Main sur la douleur, «Bismillah» 3 fois puis «A\'udhu bi\'izzatillah wa qudratihi min sharri ma ajidu wa uhadhir» 7 fois.',hi:'५. «بسم الله أرقيك من كل شيء يؤذيك... الله يشفيك»। ६. दर्द वाली जगह हाथ रखें, «بسم الله» तीन बार फिर «أعوذ بعزة الله وقدرته من شر ما أجد وأحاذر» सात बार।',bn:'৫. «بسم الله أرقيك من كل شيء يؤذيك... الله يشفيك»। ৬. ব্যথার জায়গায় হাত, «بسم الله» তিনবার, তারপর «أعوذ بعزة الله وقدرته من شر ما أجد وأحاذر» সাতবার।',id:'5. "Bismillah arqeek min kulli syai\'in yu\'dheek... Allah yashfeek." 6. Letakkan tangan di tempat sakit, «Bismillah» 3x lalu «A\'udhu bi\'izzatillah wa qudratihi min sharri ma ajidu wa uhadhir» 7x.',ms:'5. "Bismillah arqeek min kulli syai\'in yu\'zeek... Allah yashfeek." 6. Letak tangan di tempat sakit, «Bismillah» 3x lalu «A\'udhu bi\'izzatillahi wa qudratihi...» 7x.',tr:'5. "Bismillâhi erqîke min külli şey\'in yü\'zîke... Allahu yeşfîke." 6. Ağrıyan yere el koy, «Bismillah» 3 kez, sonra «A\'ûzu bi\'izzetillâhi ve kudretihi min şerri mâ ecidu ve uhâzir» 7 kez.'}},
{type:'r',text:{ar:'٧ـ أَعُوذُ بِكَلِمَاتِ اللَّهِ التَّامَّاتِ مِنْ شَرِّ مَا خَلَقَ. ٨ـ أَعُوذُ بِكَلِمَاتِ اللَّهِ التَّامَّاتِ مِنْ غَضَبِهِ وَعِقَابِهِ وَشَرِّ عِبَادِهِ وَمِنْ هَمَزَاتِ الشَّيَاطِينِ وَأَنْ يَحْضُرُونِ. ٩ـ أَعُوذُ بِكَلِمَاتِ اللَّهِ التَّامَّةِ مِنْ كُلِّ شَيْطَانٍ وَهَامَّةٍ، وَمِنْ كُلِّ عَيْنٍ لَامَّةٍ. ١٠ـ بِسْمِ اللَّهِ الَّذِي لَا يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الْأَرْضِ وَلَا فِي السَّمَاءِ وَهُوَ السَّمِيعُ الْعَلِيمُ (ثلاثاً).',en:'7. "A\'udhu bi kalimatillah al-tammati min sharri ma khalaq." 8. "A\'udhu bi kalimatillah al-tammati min ghadabihi wa \'iqabihi wa sharri \'ibadihi wa min hamazat al-shayatin wa an yahduroon." 9. "A\'udhu bi kalimatillah al-tammati min kulli shaytanin wa hammah wa min kulli \'ayn lammah." 10. "Bismillah alladhi la yadurru ma\'a ismihi shay\'un fi al-ard wa la fi al-sama\'i wa huwa al-Sami\'u al-\'Alim." — three times.',ur:'٧۔ «أعوذ بكلمات اللہ التامات من شر ما خلق»۔ ٨۔ «أعوذ بكلمات اللہ التامات من غضبه وعقابه وشر عباده ومن همزات الشياطين»۔ ٩۔ «أعوذ بكلمات اللہ التامة من كل شيطان وهامة، ومن كل عين لامة»۔ ١٠۔ «بسم اللہ الذي لا يضر مع اسمه شيء في الأرض ولا في السماء وهو السميع العليم» (تین مرتبہ)۔',fa:'٧. «أعوذ بكلمات الله التامات من شر ما خلق». ٨. «أعوذ بكلمات الله التامات من غضبه وعقابه وشر عباده ومن همزات الشياطين». ٩. «أعوذ بكلمات الله التامة من كل شيطان وهامة، ومن كل عين لامة». ١٠. «بسم الله الذي لا يضر مع اسمه شيء في الأرض ولا في السماء وهو السميع العليم» (سه بار).',fr:'7. «A\'udhu bi kalimatillah al-tammati min sharri ma khalaq.» 8. «A\'udhu bi kalimatillah al-tammati min ghadabihi wa \'iqabihi...» 9. «A\'udhu bi kalimatillah al-tammati min kulli shaytanin wa hammah...» 10. «Bismillah alladhi la yadurru ma\'a ismihi shay\'un...» (trois fois)',hi:'७. «أعوذ بكلمات الله التامات من شر ما خلق»। ८. «...من غضبه وعقابه وشر عباده ومن همزات الشياطين»। ९. «أعوذ بكلمات الله التامة من كل شيطان وهامة، ومن كل عين لامة»। १०. «بسم الله الذي لا يضر مع اسمه شيء في الأرض ولا في السماء وهو السميع العليم» (तीन बार)।',bn:'৭. «أعوذ بكلمات الله التامات من شر ما خلق»। ৮. «...من غضبه وعقابه وشر عباده ومن همزات الشياطين»। ৯. «أعوذ بكلمات الله التامة من كل شيطان وهامة»। ১০. «بسم الله الذي لا يضر مع اسمه شيء في الأرض ولا في السماء» (তিনবার)।',id:'7. «A\'udhu bi kalimatillah al-tammati min sharri ma khalaq.» 8. «A\'udhu bi kalimatillah al-tammati min ghadabihi wa \'iqabihi...» 9. «A\'udhu bi kalimatillah al-tammati min kulli shaytanin wa hammah...» 10. «Bismillah alladhi la yadurru ma\'a ismihi shay\'un...» (tiga kali)',ms:'7. «A\'udhu bi kalimatillahi al-tammati min syarri ma khalaq.» 8. «A\'udhu bi kalimatillahi al-tammati min ghadabihi wa \'iqabihi...» 9. «A\'udhu bi kalimatillahi al-tammati min kulli syaitanin...» 10. «Bismillahilladzi la yadurru ma\'a ismihi syai\'un...» (tiga kali)',tr:'7. «A\'ûzu bi kelimâtillâhit-tâmmâti min şerri mâ halak.» 8. «A\'ûzu bi kelimâtillâhit-tâmmâti min gadabihî ve \'ikâbihî...» 9. «A\'ûzu bi kelimâtillâhit-tâmmeti min külli şeytânin ve hâmmetin...» 10. «Bismillâhillezî lâ yadurru me\'asmihî şey\'un fil-erdı...» (üç kez)'}}
]}

title:{ar:'أحاديث في فضل المرض والمصائب والصبر عليها',ur:'بیماری، مصائب اور صبر کی فضیلت',fa:'احادیث در فضل بیماری و صبر',en:'Virtue of Illness, Trials & Patience',fr:'Vertu de la maladie et patience',hi:'बीमारी और सब्र की फ़ज़ीलत',bn:'রোগ ও ধৈর্যের ফযিলত',id:'Keutamaan Sakit dan Sabar',ms:'Kelebihan Sakit dan Sabar',tr:'Hastalık ve Sabır Fazileti'},
blocks:[
{type:'i',text:{ar:'أخي المريض: هذه الباقة العطرة من الأحاديث النبوية الصحيحة تدل على عظم أجرك عند الله، إن أنت صبرت على مرضك وقابلت قدر الله تعالى بالتسليم والرضا لا بالجزع والتسخط والتشكي.',en:'Dear patient: These fragrant authentic hadiths show the greatness of your reward with Allah — if you are patient with your illness and accept Allah\'s decree with submission and contentment, not with distress or complaint.',ur:'اخی المریض: یہ احادیث نبوی کا معطر گلدستہ آپ کے اللہ کے ہاں عظیم اجر کی دلیل ہے — اگر صبر کریں اور اللہ کے فیصلے کو رضا سے قبول کریں، بے چینی اور شکایت سے نہیں۔',fa:'برادر بیمار: این دسته گل احادیث صحیح نشان‌دهنده عظمت اجر توست نزد الله — اگر بر بیماری صبر کنی و قضای الهی را با تسلیم و رضا بپذیری.',fr:'Cher malade: Ces hadiths authentiques témoignent de ta grande récompense auprès d\'Allah, si tu es patient et acceptes le décret d\'Allah avec soumission et contentement.',hi:'प्रिय मरीज़: ये सहीह हदीसें आपके अल्लाह के पास अज़ीम अज्र की दलील हैं — बशर्ते सब्र करें और अल्लाह की तक़दीर रज़ा से क़बूल करें।',bn:'প্রিয় রোগী: এই সহীহ হাদীসগুলো আল্লাহর কাছে বিশাল পুরস্কার প্রমাণ করে — যদি ধৈর্য ধরেন ও সন্তুষ্টচিত্তে মেনে নেন।',id:'Saudara yang sakit: Hadits-hadits sahih ini menunjukkan besarnya pahalamu di sisi Allah — jika bersabar dan menerima takdir Allah dengan kerelaan.',ms:'Saudara yang sakit: Hadith-hadith sahih ini menunjukkan besarnya pahalamu di sisi Allah — jika bersabar dan menerima ketentuan Allah dengan kerelaan.',tr:'Sevgili hasta: Bu sahih hadisler, hastalığına sabredersen Allah katındaki büyük ecrine işaret eder.'}},
{type:'h',text:{ar:'١. عن أبي هريرة وأبي سعيد الخدري رضي الله عنهما أن النبي ﷺ قال: «مَا يُصِيبُ الْمُسْلِمَ مِنْ نَصَبٍ وَلَا وَصَبٍ وَلَا هَمٍّ وَلَا حَزَنٍ وَلَا أَذًى وَلَا غَمٍّ حَتَّى الشَّوْكَةِ يُشَاكُهَا إِلَّا كَفَّرَ اللَّهُ بِهَا مِنْ خَطَايَاهُ» [متفق عليه]. النَّصَب: التعب. الوَصَب: المرض.',en:'1. Abu Hurairah & Abu Sa\'id al-Khudri ◌: The Prophet ﷺ said: "No fatigue, illness, worry, grief, hurt or distress befalls a Muslim — even the prick of a thorn — except that Allah expiates his sins through it." [Agreed upon] (Nasab = fatigue; Wasab = illness)',ur:'١۔ ابو ہریرہ اور ابو سعید خدری رضی اللہ عنہما: نبی ﷺ نے فرمایا: «مسلمان کو جو تھکان، بیماری، فکر، غم، تکلیف — یہاں تک کہ کانٹا چبھنا — اللہ اس سے گناہ مٹا دیتا ہے» [متفق علیہ]۔',fa:'١. از ابوهریره و ابوسعید خدری: پیامبر ﷺ فرمود: «هیچ خستگی، بیماری، غم، آزار — حتی خار — به مسلمان نمی‌رسد مگر الله گناهانش را می‌آمرزد» [متفق علیه].',fr:'1. Abu Hurairah & Abu Sa\'id ◌: «Aucune fatigue, maladie, souci — même la piqûre d\'une épine — n\'atteint le Muslim sans qu\'Allah n\'expie ses péchés.» [Muttafaqun \'alayh]',hi:'१. अबू हुरैरा व अबू सईद खुदरी ◌: नबी ﷺ ने फरमाया: «मुसलमान को जो थकान, बीमारी, चिंता — यहाँ तक कि काँटा चुभना — अल्लाह उससे गुनाह मिटा देता है» [मुत्तफ़क़ अलैह]।',bn:'১. আবু হুরায়রা ও আবু সাঈদ ◌: নবী ﷺ বলেন: «মুসলিমকে যে ক্লান্তি, রোগ, চিন্তা — এমনকি কাঁটার আঘাত — আল্লাহ তার মাধ্যমে গুনাহ মোচন করেন» [মুত্তাফাক্ব আলাইহ]।',id:'1. Abu Hurairah & Abu Sa\'id ◌: Nabi ﷺ bersabda: "Tidaklah kelelahan, sakit, kekhawatiran — bahkan duri yang menusuk — menimpa Muslim kecuali Allah hapus dosanya." [Muttafaq \'alaih]',ms:'1. Abu Hurairah & Abu Sa\'id ◌: Nabi ﷺ bersabda: "Tidaklah penat, sakit, kebimbangan — bahkan tusukan duri — menimpa Muslim melainkan Allah hapuskan dosanya." [Muttafaq \'alaih]',tr:'1. Ebû Hüreyre ve Ebû Saîd ◌: Peygamber ﷺ buyurdu: "Bir Müslümana isabet eden hiçbir yorgunluk, hastalık, tasa — hatta batan bir diken bile — olmaz ki Allah onunla günahlarını silmesin." [Müttefekun aleyh]'}},
{type:'h',text:{ar:'٢. عن ابن مسعود رضي الله عنه: «هَمَّا مِنْ مُسْلِمٍ يُصِيبُهُ أَذًى مِنْ مَرَضٍ فَمَا سِوَاهُ إِلَّا حَطَّ اللَّهُ بِهِ مِنْ سَيِّئَاتِهِ كَمَا تَحُطُّ الشَّجَرَةُ وَرَقَهَا» [متفق عليه]. ٣. عن عائشة رضي الله عنها: «مَا مِنْ مُصِيبَةٍ تُصِيبُ الْمُسْلِمَ إِلَّا كَفَّرَ اللَّهُ بِهَا عَنْهُ حَتَّى الشَّوْكَةِ يُشَاكُهَا» [متفق عليه].',en:'2. Ibn Mas\'ud ◌: "No Muslim is harmed by illness or anything else except that Allah drops his sins because of it, as a tree sheds its leaves." [Agreed upon] 3. Aisha ◌: "No affliction befalls a Muslim except that Allah expiates his sins through it — even the prick of a thorn." [Agreed upon]',ur:'٢۔ ابن مسعود ◌: «جو مسلمان بیماری یا تکلیف سے متاثر ہو، اللہ گناہ جھاڑ دیتا ہے جیسے درخت پتے جھاڑتا ہے» [متفق علیہ]۔ ٣۔ عائشہ ◌: «مسلمان کو جو مصیبت آئے اللہ گناہ معاف کرتا ہے — کانٹا چبھنا بھی» [متفق علیہ]۔',fa:'٢. ابن مسعود ◌: «هر مسلمانی از بیماری آسیب ببیند، الله گناهانش را می‌ریزد مثل درخت که برگ می‌ریزد» [متفق علیه]. ٣. عائشه ◌: «هیچ مصیبتی به مسلمان نمی‌رسد مگر الله گناهش را می‌بخشد — حتی خار» [متفق علیه].',fr:'2. Ibn Mas\'ud ◌: «Nul Muslim blessé par maladie sans qu\'Allah fasse tomber ses péchés, comme un arbre perd ses feuilles.» [Muttafaqun \'alayh] 3. Aïcha ◌: «Toute affliction du Muslim est expiation — même l\'épine.» [Muttafaqun \'alayh]',hi:'२. इब्न मसऊद ◌: «जो मुसलमान बीमारी से पीड़ित हो, अल्लाह गुनाह झाड़ता है जैसे पेड़ पत्ते» [मुत्तफ़क़ अलैह]। ३. आयशा ◌: «मुसलमान को जो मुसीबत आए अल्लाह गुनाह माफ़ करता है — काँटा भी» [मुत्तफ़क़ अलैह]।',bn:'২. ইবনে মাসউদ ◌: «বিমার মুসলিমের গুনাহ ঝরে যেমন গাছের পাতা» [মুত্তাফাক্ব]। ৩. আয়িশা ◌: «মুসলিমের যে কোনো বিপদেই আল্লাহ গুনাহ মাফ করেন» [মুত্তাফাক্ব]।',id:'2. Ibnu Mas\'ud ◌: "Tidaklah Muslim ditimpa penyakit melainkan Allah gugurkan dosanya seperti pohon menggugurkan daun." [Muttafaq \'alaih] 3. Aisha ◌: "Tidak ada musibah menimpa Muslim kecuali Allah hapuskan dosanya — bahkan tusukan duri." [Muttafaq \'alaih]',ms:'2. Ibnu Mas\'ud ◌: "Tidaklah Muslim ditimpa penyakit melainkan Allah gugurkan dosanya seperti pokok menggugurkan daun." [Muttafaq \'alaih] 3. Aishah ◌: "Tidak ada musibah menimpa Muslim kecuali Allah hapuskan dosanya — bahkan duri." [Muttafaq \'alaih]',tr:'2. İbn Mes\'ûd ◌: "Bir Müslümana hastalık isabet etmez ki Allah günahlarını döksün — tıpkı ağacın yaprak döktüğü gibi." [Müttefekun aleyh] 3. Aişe ◌: "Müslümana hiçbir musibet isabet etmez ki Allah günahını bağışlamasın." [Müttefekun aleyh]'}},
{type:'h',text:{ar:'٤. عن أبي هريرة لما نزلت ﴿مَنْ يَعْمَلْ سُوءًا يُجْزَ بِهِ﴾ [النساء:١٢٣] قال ﷺ: «قَارِبُوا وَسَدِّدُوا، فَفِي مَا يُصَابُ بِهِ الْمُسْلِمُ كَفَّارَةٌ حَتَّى النَّكْبَةِ يَنْكِبُهَا أَوِ الشَّوْكَةِ يُشَاكُهَا» [مسلم]. ٥. عن جابر رضي الله عنه أن النبي ﷺ قال لأم السائب: «لَا تَسُبِّي الْحُمَّى فَإِنَّهَا تُذْهِبُ خَطَايَا بَنِي آدَمَ كَمَا يُذْهِبُ الْكِيرُ خَبَثَ الْحَدِيدِ» [مسلم].',en:'4. Abu Hurairah ◌: When [4:123] was revealed, the Prophet ﷺ said: "Be moderate and steadfast; for what befalls the Muslim is an expiation — even a stumble or thorn prick." [Muslim] 5. Jabir ◌: The Prophet ﷺ told Umm al-Sa\'ib: "Do not curse fever; it removes the sins of Adam\'s children as a furnace removes the impurity of iron." [Muslim]',ur:'٤۔ ابو ہریرہ ◌: جب آیت [النساء:123] نازل ہوئی، نبی ﷺ نے فرمایا: «میانہ روی اختیار کرو — مسلمان کو جو بھی تکلیف ہو وہ کفارہ ہے» [مسلم]۔ ٥۔ جابر ◌: نبی ﷺ نے ام السائب سے فرمایا: «بخار کو گالی مت دو — یہ گناہ دور کرتا ہے جیسے بھٹی لوہے کا میل» [مسلم]۔',fa:'٤. ابوهریره ◌: وقتی [نساء:123] نازل شد، پیامبر ﷺ فرمود: «قاربوا وسددوا، آنچه مسلمان بدان مبتلا می‌شود کفاره است» [مسلم]. ٥. جابر ◌: به ام‌السائب: «به تب بد نگو — گناه بنی‌آدم را می‌برد مثل کوره آهن» [مسلم].',fr:'4. Abu Hurairah ◌: lors de la révélation de [4:123]: «Soyez modérés; ce qui afflige le Muslim est expiation.» [Muslim] 5. Jabir ◌: Le Prophète ﷺ dit à Umm al-Sa\'ib: «Ne maudis pas la fièvre; elle efface les péchés comme le soufflet purifie le métal.» [Muslim]',hi:'४. जब [4:123] नाज़िल हुई, नबी ﷺ ने फरमाया: «मुतलव रहो — मुसलमान को जो तकलीफ हो वो कफ़्फ़ारा है» [मुस्लिम]। ५. नबी ﷺ ने उम्मुस्साइब से फरमाया: «बुखार को गाली मत दो — गुनाह दूर करता है जैसे भट्टी लोहे का मैल» [मुस्लिम]।',bn:'৪. [4:123] নাযিল হলে নবী ﷺ বললেন: «মধ্যমপন্থী হও — মুসলিমের যে কষ্ট হয় তা কাফফারা» [মুসলিম]। ৫. নবী ﷺ উম্মুস্সাইবকে: «জ্বরকে গালি দিও না — গুনাহ দূর করে যেমন হাপর লোহার ময়লা» [মুসলিম]।',id:'4. Abu Hurairah ◌: saat [4:123] turun: "Berlaku moderat; apa yang menimpa Muslim adalah kafarat." [Muslim] 5. Jabir ◌: Nabi ﷺ kepada Umm al-Sa\'ib: "Jangan mencela demam; ia menghapus dosa seperti tungku memurnikan besi." [Muslim]',ms:'4. Abu Hurairah ◌: ketika [4:123] turun: "Berlaku sederhana; apa yang menimpa Muslim adalah kafarat." [Muslim] 5. Jabir ◌: Nabi ﷺ kepada Umm al-Sa\'ib: "Jangan maki demam; ia menghapus dosa seperti relau memurnikan besi." [Muslim]',tr:'4. Ebû Hüreyre ◌: [4:123] indiğinde: "Orta yolu tutun; Müslümana isabet eden keffaret olur." [Müslim] 5. Câbir ◌: Ümmü\'s-Sâib\'e: "Ateşe sövme; o günahları giderir, körük gibi demirin pasını." [Müslim]'}},
{type:'h',text:{ar:'٦. عن أم العلاء رضي الله عنها: عادني رسول الله ﷺ وأنا مريضة فقال: «أَبْشِرِي يَا أُمَّ الْعَلَاءِ فَإِنَّ مَرَضَ الْمُسْلِمِ يُذْهِبُ اللَّهُ بِهِ خَطَايَاهُ كَمَا تُذْهِبُ النَّارُ خَبَثَ الذَّهَبِ وَالْفِضَّةِ» [أبو داود وحسنه المنذري]. ٧. عن أبي هريرة: «مَا يَزَالُ الْبَلَاءُ بِالْمُؤْمِنِ وَالْمُؤْمِنَةِ فِي نَفْسِهِ وَوَلَدِهِ وَمَالِهِ حَتَّى يَلْقَى اللَّهَ وَمَا عَلَيْهِ خَطِيئَةٌ» [الترمذي: حسن صحيح].',en:'6. Umm al-\'Ala ◌: The Messenger ﷺ visited me while sick and said: "Rejoice, O Umm al-\'Ala! For Allah removes a Muslim\'s sins through illness, as fire removes impurities from gold and silver." [Abu Dawud; authenticated by al-Mundhiri] 7. Abu Hurairah ◌: "Trials never cease to afflict the believing man and woman in themselves, their children and wealth, until they meet Allah with no sin." [Al-Tirmidhi: hasan sahih]',ur:'٦۔ ام العلاء ◌: رسول اللہ ﷺ میری عیادت کو آئے: «خوش ہو جاؤ! مسلمان کی بیماری سے اللہ گناہ دور کرتا ہے جیسے آگ سونے چاندی کی کثافت» [ابو داود]۔ ٧۔ ابو ہریرہ ◌: «مومن مرد و عورت پر مصائب آتے رہتے ہیں یہاں تک کہ بغیر گناہ کے اللہ سے ملے» [ترمذی: حسن صحیح]۔',fa:'٦. ام‌العلاء ◌: پیامبر ﷺ به عیادتم آمد: «بشارت باد! بیماری مسلمان گناهانش را می‌برد مثل آتش ناخالصی طلا» [ابوداود]. ٧. ابوهریره ◌: «پیوسته بلا مومن را می‌آزماید تا خدا را بدون گناه ملاقات کند» [ترمذی: حسن صحیح].',fr:'6. Umm al-\'Ala ◌: Le Messager ﷺ me rendit visite: «Réjouis-toi! La maladie du Muslim efface ses péchés comme le feu purifie l\'or.» [Abu Dawud] 7. Abu Hurairah ◌: «Les épreuves ne cessent d\'affliger le croyant jusqu\'à ce qu\'il rencontre Allah sans péché.» [Tirmidhi: hasan sahih]',hi:'६. उम्मुल अला ◌: रसूलुल्लाह ﷺ मेरी अयादत को आए: «खुश हो! मुसलमान की बीमारी से गुनाह दूर होते हैं जैसे आग सोने का मैल» [अबू दाऊद]। ७. «मोमिन पर बला आती रहती है यहाँ तक कि गुनाहमुक्त अल्लाह से मिले» [तिर्मिज़ी]।',bn:'৬. উম্মুল আলা ◌: রাসূলুল্লাহ ﷺ এলেন: «সুসংবাদ! মুসলিমের রোগ গুনাহ দূর করে যেমন আগুন সোনার ময়লা» [আবু দাঊদ]। ৭. «মোমিনের উপর মুসীবত আসতে থাকে যতক্ষণ না গুনাহমুক্ত হয়» [তিরমিযী]।',id:'6. Umm al-\'Ala ◌: Rasulullah ﷺ mengunjungiku: "Bergembiralah! Sakit Muslim menghapus dosanya seperti api memurnikan emas." [Abu Dawud] 7. Abu Hurairah ◌: "Cobaan tak henti menimpa mukmin hingga ia bertemu Allah tanpa dosa." [Tirmidzi: hasan sahih]',ms:'6. Umm al-\'Ala ◌: Rasulullah ﷺ melawatku: "Bergembiralah! Sakit Muslim menghapuskan dosanya seperti api memurnikan emas." [Abu Dawud] 7. Abu Hurairah ◌: "Ujian sentiasa menimpa mukmin hingga dia bertemu Allah tanpa dosa." [Tirmizi: hasan sahih]',tr:'6. Ümmü\'l-Alâ ◌: Rasûlullah ﷺ hasta ziyaretime geldi: "Müjde! Allah Müslümanın hastalığıyla günahlarını giderir, ateşin altın pasını giderdiği gibi." [Ebû Dâvûd] 7. Ebû Hüreyre ◌: "Sınav mü\'mini bırakmaz; ta ki Allah\'a günahsız kavuşana dek." [Tirmizî: hasan sahih]'}},
{type:'h',text:{ar:'٨. عن سعد بن أبي وقاص رضي الله عنه: «مَا يَبْرَحُ الْبَلَاءُ بِالْعَبْدِ حَتَّى يَتْرُكَهُ يَمْشِي عَلَى الْأَرْضِ وَمَا عَلَيْهِ خَطِيئَةٌ» [الترمذي وابن ماجه وصححه الألباني]. ٩. عن عائشة رضي الله عنها: «مَا مِنْ مُسْلِمٍ يُشَاكُ شَوْكَةً فَمَا فَوْقَهَا إِلَّا كُتِبَتْ لَهُ بِهَا دَرَجَةٌ وَمُحِيَتْ عَنْهُ بِهَا خَطِيئَةٌ» [مسلم]. ١٠. عن أبي سعيد رضي الله عنه: «صُدَاعُ الْمُؤْمِنِ أَوْ شَوْكَةٌ يُشَاكُهَا أَوْ شَيْءٌ يُؤْذِيهِ يَرْفَعُهُ اللَّهُ بِهَا يَوْمَ الْقِيَامَةِ دَرَجَةً وَيُكَفِّرُ عَنْهُ ذُنُوبَهُ» [ابن أبي الدنيا ورواته ثقات].',en:'8. Sa\'d ibn Abi Waqqas ◌: "Trials do not leave the servant until they leave him walking on earth with no sin upon him." [Al-Tirmidhi, Ibn Majah; authenticated by Al-Albani] 9. Aisha ◌: "No Muslim is pricked by a thorn or more except that a rank is written for him and a sin erased." [Muslim] 10. Abu Sa\'id ◌: "A headache, a thorn prick, or anything that harms the believer — Allah raises him a rank by it on the Day of Resurrection and expiates his sins." [Ibn Abi al-Dunya; narrators trustworthy]',ur:'٨۔ سعد بن ابی وقاص ◌: «بندے پر بلا آتی رہتی ہے یہاں تک کہ اسے بغیر گناہ کے چھوڑ دے» [ترمذی، ابن ماجہ، صحیح البانی]۔ ٩۔ عائشہ ◌: «جو مسلمان کانٹے سے متاثر ہو — ایک درجہ لکھا اور ایک گناہ مٹا» [مسلم]۔ ١٠۔ ابو سعید ◌: «مومن کا سردرد، کانٹا — اللہ اس سے قیامت میں ایک درجہ بلند کرے اور گناہ معاف کرے» [ابن ابی الدنیا]۔',fa:'٨. سعد بن ابی‌وقاص ◌: «بلا از بنده دست برنمی‌دارد تا بدون گناه روی زمین راه‌رو شود» [ترمذی؛ صحیح البانی]. ٩. عائشه ◌: «هر مسلمانی که خاری او را بزند، یک درجه نوشته و گناهی محو» [مسلم]. ١٠. ابوسعید ◌: «سردرد مومن یا خار، الله با آن روز قیامت درجه‌ای بالا می‌برد» [ابن ابی‌الدنیا].',fr:'8. Sa\'d ◌: «L\'épreuve ne quitte pas le serviteur jusqu\'à ce qu\'il marche sans péché.» [Tirmidhi; Albani] 9. Aïcha ◌: «Nul Muslim piqué sans qu\'un rang soit inscrit et un péché effacé.» [Muslim] 10. Abu Sa\'id ◌: «Mal de tête ou épine du croyant — Allah l\'élève d\'un rang au Jour de la Résurrection.» [Ibn Abi al-Dunya]',hi:'८. सा\'द ◌: «बंदे पर बला आती रहती है यहाँ तक बिना गुनाह के छोड़ दे» [तिर्मिज़ी; अल्बानी]। ९. आयशा ◌: «जो मुसलमान काँटा लगे — एक दर्जा लिखा और गुनाह मिटा» [मुस्लिम]। १०. अबू सईद ◌: «मोमिन का सिरदर्द — अल्लाह क़यामत में दर्जा बुलंद करेगा» [इब्न अबी अद्-दुन्या]।',bn:'৮. সা\'দ ◌: «বান্দার উপর মুসীবত আসতে থাকে যতক্ষণ না গুনাহমুক্ত করে» [তিরমিযী; আলবানী]। ৯. আয়িশা ◌: «কাঁটা বিদ্ধ মুসলিম — একটি দর্জা লাভ এবং গুনাহ মিটে» [মুসলিম]। ১০. আবু সাঈদ ◌: «মোমিনের মাথাব্যথা — আল্লাহ কিয়ামতে দর্জা উঁচু করবেন» [ইবনে আবিদ-দুনিয়া]।',id:'8. Sa\'d ◌: "Cobaan tidak berhenti menimpa hamba hingga meninggalkannya tanpa dosa." [Tirmidzi; Albani] 9. Aisha ◌: "Tidak ada Muslim tertusuk duri kecuali ditulis satu derajat dan dihapus satu dosa." [Muslim] 10. Abu Sa\'id ◌: "Sakit kepala atau duri mukmin — Allah angkat derajatnya di Hari Kiamat." [Ibnu Abi al-Dunya]',ms:'8. Sa\'d ◌: "Ujian tidak berhenti menimpa hamba hingga meninggalkannya tanpa dosa." [Tirmizi; Albani] 9. Aishah ◌: "Tidak ada Muslim tertusuk duri melainkan ditulis satu darjat dan dihapus satu dosa." [Muslim] 10. Abu Sa\'id ◌: "Sakit kepala atau duri mukmin — Allah angkat darjatnya di Hari Kiamat." [Ibn Abi al-Dunya]',tr:'8. Sa\'d ◌: "Sınav kulu bırakmaz; ta ki günahsız yürüyene dek." [Tirmizî; Elbânî] 9. Aişe ◌: "Bir Müslümana diken batmaz ki bir derece yazılıp bir günah silinmesin." [Müslim] 10. Ebû Saîd ◌: "Mü\'minin baş ağrısı veya diken — Allah kıyamette bir derece yükseltir." [İbn Ebî\'d-Dünyâ]'}},
{type:'r',text:{ar:'أخي المريض: ألا فاحمد الله على هذه النعمة التي أنعم الله بها عليك، ليكفر بها عنك ذنوبك، ويزيد لك في حسناتك، ويرفع بها درجاتك. إن من فوائد المرض أنه يبين للإنسان ضعفه وفقره إلى ربه الغني، فيلجأ إليه بعد أن كان غافلاً، ويترك مبارزته بالمعاصي. اللهم اشف مرضانا شفاءً لا يغادر سقماً، وألبسهم ثوب الصحة والعافية.',en:'Dear patient: Praise Allah for this blessing — by which He expiates your sins, multiplies your good deeds, and elevates your ranks. Among illness\'s benefits: it reveals a person\'s weakness and need for his Lord, turning him to Allah after heedlessness, and away from sin. O Allah, heal our sick with a complete healing that leaves no illness, and clothe them in health and well-being.',ur:'اخی المریض: اللہ کا شکر ادا کریں — جس سے گناہ مٹیں، نیکیاں بڑھیں اور درجات بلند ہوں۔ بیماری میں یہ فائدہ بھی ہے کہ انسان اپنی کمزوری اور رب کی محتاجگی سمجھتا ہے اور غفلت چھوڑ کر اس کی طرف لوٹتا ہے۔ اللہم ہمارے مریضوں کو مکمل شفا دے۔',fa:'برادر بیمار: الله را حمد کن — که گناهانت را می‌بخشد، حسناتت را می‌افزاید و درجاتت را بالا می‌برد. بیماری ضعف انسان و نیاز به پروردگارش را آشکار می‌کند. اللهم مریضانمان را شفای کامل ده.',fr:'Cher malade: Loue Allah pour cette grâce — par laquelle Il expie tes péchés, multiplie tes bonnes actions et élève tes rangs. La maladie révèle la faiblesse de l\'homme et son besoin de son Seigneur. Ô Allah, guéris nos malades d\'une guérison complète.',hi:'प्रिय मरीज़: अल्लाह का शुक्र अदा करें — जिससे गुनाह माफ़, नेकियाँ बढ़ें और दर्जात बुलंद हों। बीमारी से इंसान को अपनी कमज़ोरी और रब की मोहताजगी का एहसास होता है। अल्लाहुम्मा मरीज़ों को मुकम्मल शिफा दे।',bn:'প্রিয় রোগী: আল্লাহর শুকরিয়া — যার মাধ্যমে গুনাহ মাফ, নেকি বৃদ্ধি ও মর্যাদা উন্নত হয়। বীমারী দুর্বলতা ও রবের মুখাপেক্ষিতা বুঝিয়ে দেয়। হে আল্লাহ আমাদের রোগীদের পূর্ণ সুস্থতা দিন।',id:'Saudara yang sakit: Bersyukurlah kepada Allah — dengannya Dia menghapus dosamu, menambah kebaikanmu, dan meninggikan derajatmu. Sakit memperlihatkan kelemahan manusia dan kebutuhannya kepada Rabb-nya. Ya Allah, sembuhkan orang-orang sakit kami dengan kesembuhan yang sempurna.',ms:'Saudara yang sakit: Bersyukurlah kepada Allah — dengannya Dia menghapus dosamu, menambah kebaikanmu, dan meninggikan darjatmu. Sakit memperlihatkan kelemahan manusia dan keperluannya kepada Rabb-nya. Ya Allah, sembuhkan orang sakit kami dengan kesembuhan yang sempurna.',tr:'Sevgili hasta: Allah\'a bu nimet için şükret — bununla günahlarını bağışlar, iyiliklerini artırır ve derecelerini yükseltir. Hastalık insanın zayıflığını ve Rabbine muhtaçlığını gösterir. Allah\'ım, hastalarımıza hiçbir hastalık bırakmayan tam bir şifa ver.'}}
]}
]/*TOPICS_END*/;

/* ====== NAVIGATION ====== */
function show(id){['s1','s2','s3'].forEach(s=>{
  const el=document.getElementById(s);
  el.classList.toggle('on',s===id);
});
const r=document.getElementById('root');
r.setAttribute('lang',CL);
r.setAttribute('dir',LG[CL].d);
}
function goLang(){show('s1')}
function goTop(){show('s2')}
function selLang(l){CL=l;buildS2();show('s2')}
function selTop(i){CT=i;buildS3();show('s3')}

/* ====== FONT & CONTRAST ====== */
function adjF(d){FL=Math.max(0,Math.min(2,FL+d));
const sz=['0.875rem','1rem','1.2rem'][FL];
document.documentElement.style.setProperty('--fz',sz);}
function togHC(){HC=!HC;
document.getElementById('root').toggleAttribute('data-hc',HC);
document.getElementById('hcb').classList.toggle('on',HC);}

/* ====== BUILD SCREENS ====== */
function buildS1(){
  const g=document.getElementById('lgr');
  g.innerHTML=Object.entries(LG).map(([k,v])=>
    `<button class="lb" onclick="selLang('${k}')" role="listitem" aria-label="${v.n}">
      <span class="lf">${v.f}</span><span class="ln">${v.n}</span>
    </button>`).join('');
}
function buildS2(){
  document.getElementById('s2t').textContent=
    {ar:'المواضيع',ur:'موضوعات',fa:'موضوعات',en:'Topics',fr:'Sujets',hi:'विषय',bn:'বিষয়',id:'Topik',ms:'Topik',tr:'Konular'}[CL]||'Topics';
  const tl=document.getElementById('tl');
  tl.innerHTML=TP.map((t,i)=>
    `<div class="tc" onclick="selTop(${i})" role="listitem" tabindex="0"
       aria-label="${t.title[CL]||t.title.ar}"
       onkeydown="if(event.key==='Enter'||event.key===' ')selTop(${i})">
      <div class="tic">${t.icon}</div>
      <div class="tn">${i+1}</div>
      <div class="ti"><div class="tt">${t.title[CL]||t.title.ar}</div></div>
      <div class="ta">›</div>
    </div>`).join('');
}
function buildS3(){
  const t=TP[CT];
  document.getElementById('s3t').textContent=t.title[CL]||t.title.ar;
  const cb=document.getElementById('cb');
  cb.innerHTML=t.blocks.map((b,bi)=>{
    let txt=b.text[CL]||b.text.ar;
    if(b.type==='v') return `<div class="pv" id="b${bi}">${txt}</div>`;
    if(b.type==='h') return `<div class="ph" id="b${bi}">${txt}</div>`;
    if(b.type==='r') txt=txt.replace(/([.»۔])\s+([١-٩۰-۹१-९১-৯\d]+[ـ.۔])/g,'$1<br><br>$2');
    return `<p class="pp" id="b${bi}">${txt}</p>`;
  }).join('');
}

/* ====== INIT ====== */
buildS1();
</script>
